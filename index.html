<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital de Flores | Clasificador de Gasto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #dbeafe;
            --secondary: #64748b;
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius: 12px;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 40px 20px;
            box-shadow: var(--shadow-lg);
        }
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .logo {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            backdrop-filter: blur(10px);
        }
        .header-info h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .header-info p {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 400;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .stat-icon.blue { background: var(--primary-light); }
        .stat-icon.green { background: var(--success-light); }
        .stat-icon.orange { background: #fef3c7; }
        .stat-info h3 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
        }
        .stat-info p {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Upload Zone */
        .upload-zone {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: var(--radius-lg);
            padding: 60px 40px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            margin-bottom: 30px;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--primary);
            background: var(--primary-light);
        }
        .upload-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 20px;
            display: flex;            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            box-shadow: var(--shadow);
        }
        .upload-zone h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }
        .upload-zone p {
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .upload-zone input { display: none; }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 14px 32px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* Search Section */
        .search-section {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            display: none;
        }
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;        }
        .search-input {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        .btn-search {
            background: var(--primary);
            color: white;
            padding: 16px 32px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-search:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .filter-chip {
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-muted);
        }
        .filter-chip:hover, .filter-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Results */
        .results-grid {
            display: grid;
            gap: 16px;
        }
        .result-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            border-left: 4px solid var(--primary);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 0.3s;
        }
        .result-card:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow);
            border-left-color: var(--warning);
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .result-code {
            background: var(--primary-light);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .result-relevance {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg);            padding: 4px 10px;
            border-radius: 12px;
        }
        .result-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }
        .result-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
        }
        .result-tags {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .tag {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
        }
        .tag-group { background: var(--bg); color: var(--text-muted); }
        .tag-match { background: #fef3c7; color: var(--warning); }

        /* Suggestions */
        .suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .suggestion-chip {
            padding: 6px 14px;
            background: var(--bg);
            border-radius: 16px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        .suggestion-chip:hover {
            background: var(--primary-light);
            color: var(--primary);
        }
        /* Custom Keywords Panel */
        .panel {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            display: none;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .panel-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Toast */
        .toast-container {
            position: fixed;            bottom: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .toast {
            background: var(--surface);
            padding: 16px 20px;
            border-radius: 10px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            animation: slideIn 0.3s ease;
            border-left: 4px solid var(--primary);
        }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast-icon { font-size: 20px; }
        .toast-message { flex: 1; font-size: 14px; }
        .toast-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-muted);
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;            margin-right: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content { flex-direction: column; text-align: center; }
            .stats-grid { grid-template-columns: 1fr; }
            .search-box { flex-direction: column; }
            .form-grid { grid-template-columns: 1fr; }
            .toast { min-width: auto; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">🏥</div>
            <div class="header-info">
                <h1>Hospital de Flores</h1>
                <p>Edison Camacho | Sector Contaduría</p>
            </div>
        </div>
    </header>

    <!-- Container -->
    <div class="container">
        <!-- Stats -->
        <div class="stats-grid" id="statsGrid" style="display:none">
            <div class="stat-card">
                <div class="stat-icon blue">📊</div>
                <div class="stat-info">
                    <h3 id="totalItems">0</h3>
                    <p>Objetos Cargados</p>
                </div>
            </div>
            <div class="stat-card">                <div class="stat-icon green">🔍</div>
                <div class="stat-info">
                    <h3 id="searchCount">0</h3>
                    <p>Búsquedas</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange">🏷️</div>
                <div class="stat-info">
                    <h3 id="customCount">0</h3>
                    <p>Palabras Personalizadas</p>
                </div>
            </div>
        </div>

        <!-- Upload Zone -->
        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📁</div>
            <h2>Cargá tu archivo CSV</h2>
            <p>Arrastrá el archivo acá o hacé click para seleccionar</p>
            <label class="btn-primary" for="csvFile">
                📂 Seleccionar Archivo
                <input type="file" id="csvFile" accept=".csv">
            </label>
            <p style="margin-top:16px;font-size:13px;color:var(--text-muted)">
                ✅ Formato CSV UTF-8 • ✅ Con encabezado • ✅ Máx 10MB
            </p>
        </div>

        <!-- Search Section -->
        <div class="search-section" id="searchSection">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" 
                       placeholder="Buscá por objeto, denominación o código...">
                <button class="btn-search" onclick="buscar()">
                    🔍 Buscar
                </button>
            </div>
            
            <div class="filters" id="filters">
                <button class="filter-chip active" onclick="setLimit(20)">20</button>
                <button class="filter-chip" onclick="setLimit(50)">50</button>
                <button class="filter-chip" onclick="setLimit(100)">100</button>
                <span style="width:1px;background:var(--border);margin:0 8px"></span>
                <button class="filter-chip" onclick="filterGroup('0')">G0</button>
                <button class="filter-chip" onclick="filterGroup('1')">G1</button>
                <button class="filter-chip" onclick="filterGroup('2')">G2</button>
                <button class="filter-chip" onclick="filterGroup('3')">G3</button>
                <button class="filter-chip" onclick="filterGroup('4')">G4</button>
                <button class="filter-chip" onclick="filterGroup('5')">G5</button>                <button class="filter-chip" onclick="clearFilters()">🔄 Limpiar</button>
            </div>

            <div class="results-grid" id="results"></div>
            
            <div class="suggestions" id="suggestions"></div>
        </div>

        <!-- Custom Keywords Panel -->
        <div class="panel" id="keywordsPanel">
            <div class="panel-header">
                <h3 class="panel-title">🏷️ Palabras Personalizadas</h3>
                <button class="filter-chip" onclick="togglePanel()">Ocultar</button>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Palabra</label>
                    <input type="text" id="kwWord" placeholder="Ej: insumos">
                </div>
                <div class="form-group">
                    <label>Objeto</label>
                    <input type="text" id="kwObj" placeholder="Ej: 191" maxlength="3">
                </div>
                <div class="form-group">
                    <label>Auxiliar</label>
                    <input type="text" id="kwAux" value="000" maxlength="3">
                </div>
            </div>
            <button class="btn-primary" onclick="addKeyword()">➕ Agregar Palabra</button>
            <div id="keywordsList" style="margin-top:20px"></div>
        </div>

        <button class="filter-chip" id="toggleKeywords" style="display:none" onclick="togglePanel()">
            🏷️ Gestionar Palabras Personalizadas
        </button>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
    // Estado
    const state = {
        datos: [],
        limite: 20,
        filtro: '',
        busquedas: 0,
        keywords: {},
        debounce: null
    };
    // Mapeo semántico
    const mapa = {
        'harina':['111'],'arroz':['111'],'carne':['111'],'aceite':['111'],
        'sueldo':['011','021'],'salario':['011'],
        'combustible':['141'],'nafta':['141'],'gasoil':['141'],
        'medicamento':['152'],'droga':['152'],
        'vehiculo':['353'],'auto':['353'],
        'internacion':['283'],'hospital':['283'],
        'computadora':['323'],'laptop':['323'],
        'limpieza':['192'],'jabon':['192'],
        'luz':['213'],'electricidad':['213'],'agua':['212'],
        'telefono':['211'],'internet':['211'],
        'util':['191'],'oficina':['191'],'papel':['191'],
        'viatico':['234'],'pasaje':['231'],
        'jubilacion':['571'],'beca':['577'],
        'herramienta':['176'],
        'plomeria':['271','163'],
        'seguridad':['291'],
        'mueble':['326'],'silla':['326'],'mesa':['326'],
        'impuesto':['263'],'seguro':['264'],
        'mantenimiento':['271']
    };

    // Utilidades
    const norm = t => t ? t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim() : '';
    const escape = t => { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; };
    
    function toast(msg, type='success') {
        const c = document.getElementById('toastContainer');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerHTML = `
            <span class="toast-icon">${type==='success'?'✅':'❌'}</span>
            <span class="toast-message">${escape(msg)}</span>
            <button class="toast-close" onclick="this.parentElement.remove()">✕</button>
        `;
        c.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // Carga de archivo
    document.getElementById('csvFile').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        
        if (!file.name.endsWith('.csv')) {
            toast('Solo archivos CSV', 'error');
            return;
        }        if (file.size > 10*1024*1024) {
            toast('Máximo 10MB', 'error');
            return;
        }

        const reader = new FileReader();
        reader.onload = ev => procesarCSV(ev.target.result);
        reader.onerror = () => toast('Error al leer archivo', 'error');
        reader.readAsText(file, 'UTF-8');
    });

    // Drag & drop
    const zone = document.getElementById('uploadZone');
    ['dragenter','dragover'].forEach(e => zone.addEventListener(e, ev => {
        ev.preventDefault();
        zone.classList.add('dragover');
    }));
    ['dragleave','drop'].forEach(e => zone.addEventListener(e, ev => {
        ev.preventDefault();
        zone.classList.remove('dragover');
    }));
    zone.addEventListener('drop', e => {
        const file = e.dataTransfer.files[0];
        if (file) {
            document.getElementById('csvFile').files = e.dataTransfer.files;
            document.getElementById('csvFile').dispatchEvent(new Event('change'));
        }
    });

    // Procesar CSV
    function procesarCSV(texto) {
        try {
            if (texto.charCodeAt(0) === 0xFEFF) texto = texto.slice(1);
            const lineas = texto.replace(/\r\n/g,'\n').split('\n').filter(l=>l.trim());
            
            if (lineas.length < 2) throw new Error('CSV vacío');
            
            state.datos = [];
            for (let i = 1; i < lineas.length; i++) {
                const campos = parseCSV(lineas[i]);
                if (campos.length >= 3 && campos[0]?.match(/^\d{3}$/)) {
                    state.datos.push({
                        objeto: campos[0].trim(),
                        auxiliar: campos[1]?.trim() || '000',
                        denominacion: campos[2]?.trim() || '',
                        descripcion: campos[3]?.trim() || '',
                        grupo: campos[0][0]
                    });
                }
            }            
            if (!state.datos.length) throw new Error('Sin datos válidos');
            
            // Mostrar UI
            document.getElementById('statsGrid').style.display = 'grid';
            document.getElementById('searchSection').style.display = 'block';
            document.getElementById('toggleKeywords').style.display = 'inline-flex';
            document.getElementById('totalItems').textContent = state.datos.length;
            
            cargarSugerencias();
            toast(`${state.datos.length} objetos cargados`);
        } catch (err) {
            toast(err.message, 'error');
        }
    }

    function parseCSV(linea) {
        const campos = [];
        let campo = '', quotes = false;
        for (let i = 0; i < linea.length; i++) {
            const c = linea[i];
            if (c === '"') quotes = !quotes;
            else if (c === ',' && !quotes) { campos.push(campo.trim()); campo = ''; }
            else campo += c;
        }
        campos.push(campo.trim());
        return campos.map(c => c.replace(/^"|"$/g, ''));
    }

    // Búsqueda
    document.getElementById('searchInput').addEventListener('input', e => {
        clearTimeout(state.debounce);
        state.debounce = setTimeout(() => {
            if (e.target.value.length >= 2) buscar();
        }, 300);
    });

    document.getElementById('searchInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') buscar();
    });

    function buscar() {
        const q = norm(document.getElementById('searchInput').value);
        if (q.length < 2) return;

        state.busquedas++;
        document.getElementById('searchCount').textContent = state.busquedas;

        let resultados = state.datos.map(d => {
            let score = 0, match = null;            
            if (state.keywords[q]?.some(k => k.obj === d.objeto)) { score = 100; match = 'personalizada'; }
            if (mapa[q]?.includes(d.objeto)) { score = 50; match = match || 'mapeo'; }
            if (d.objeto === q) { score = 60; match = match || 'código'; }
            if (norm(d.denominacion).includes(q)) { score = 40; match = match || 'denominación'; }
            if (norm(d.descripcion).includes(q)) { score = 30; match = match || 'descripción'; }
            
            return { ...d, score, match };
        });

        resultados = resultados.filter(r => r.score >= 20);
        if (state.filtro) resultados = resultados.filter(r => r.grupo === state.filtro);
        resultados.sort((a,b) => b.score - a.score);
        resultados = resultados.slice(0, state.limite);

        renderResultados(resultados, q);
    }

    function renderResultados(resultados, q) {
        const container = document.getElementById('results');
        
        if (!resultados.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🔍</div>
                    <p>No se encontraron resultados</p>
                </div>
            `;
            return;
        }

        container.innerHTML = resultados.map((r, i) => `
            <div class="result-card" onclick="copiar('${r.objeto}/${r.auxiliar}')">
                <div class="result-header">
                    <span class="result-code">
                        ${r.objeto}/${r.auxiliar}
                        <span style="cursor:pointer" onclick="event.stopPropagation();copiar('${r.objeto}/${r.auxiliar}')">📋</span>
                    </span>
                    <span class="result-relevance">${r.score}% relevancia</span>
                </div>
                <div class="result-title">${highlight(r.denominacion, q)}</div>
                <div class="result-desc">${highlight(r.descripcion.slice(0,150), q)}${r.descripcion.length>150?'...':''}</div>
                <div class="result-tags">
                    <span class="tag tag-group">Grupo ${r.grupo}</span>
                    ${r.match ? `<span class="tag tag-match">🏷️ ${r.match}</span>` : ''}
                </div>
                ${i===0?'<div style="margin-top:10px;font-size:12px;color:var(--warning)">⭐ Mejor resultado</div>':''}
            </div>
        `).join('');
    }
    function highlight(text, q) {
        if (!q || q.length < 2) return escape(text);
        const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
        return escape(text).replace(regex, '<mark style="background:#fef3c7;padding:0 2px;border-radius:2px">$1</mark>');
    }

    async function copiar(texto) {
        try {
            await navigator.clipboard.writeText(texto);
            toast(`Copiado: ${texto}`);
        } catch {
            toast('No se pudo copiar', 'error');
        }
    }

    // Filtros
    function setLimit(l) {
        state.limite = l;
        document.querySelectorAll('.filter-chip').forEach(b => {
            b.classList.toggle('active', b.textContent === String(l));
        });
        if (document.getElementById('results').children.length) buscar();
    }

    function filterGroup(g) {
        state.filtro = state.filtro === g ? '' : g;
        document.querySelectorAll('.filter-chip').forEach(b => {
            b.classList.toggle('active', b.textContent === `G${g}` && state.filtro === g);
        });
        buscar();
    }

    function clearFilters() {
        state.filtro = '';
        state.limite = 20;
        document.getElementById('searchInput').value = '';
        document.getElementById('results').innerHTML = '';
        document.querySelectorAll('.filter-chip').forEach((b,i) => {
            b.classList.toggle('active', i === 0);
        });
    }

    function cargarSugerencias() {
        const sugg = ['harina','sueldo','combustible','medicamento','vehículo','limpieza','electricidad','teléfono','útiles','mantenimiento'];
        document.getElementById('suggestions').innerHTML = sugg.map(s => 
            `<button class="suggestion-chip" onclick="document.getElementById('searchInput').value='${s}';buscar()">${s}</button>`
        ).join('');
    }
    // Keywords personalizadas
    function togglePanel() {
        const p = document.getElementById('keywordsPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function addKeyword() {
        const word = norm(document.getElementById('kwWord').value);
        const obj = document.getElementById('kwObj').value;
        const aux = document.getElementById('kwAux').value || '000';
        
        if (!word || !obj || !/^\d{3}$/.test(obj)) {
            toast('Verificá los datos', 'error');
            return;
        }
        
        if (!state.keywords[word]) state.keywords[word] = [];
        state.keywords[word].push({ obj, aux, fecha: new Date().toISOString() });
        
        localStorage.setItem('hf_keywords', JSON.stringify(state.keywords));
        document.getElementById('customCount').textContent = Object.keys(state.keywords).length;
        
        renderKeywords();
        document.getElementById('kwWord').value = '';
        document.getElementById('kwObj').value = '';
        toast('Palabra agregada');
    }

    function renderKeywords() {
        const list = document.getElementById('keywordsList');
        const entries = Object.entries(state.keywords);
        
        if (!entries.length) {
            list.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px">Sin palabras personalizadas</p>';
            return;
        }
        
        list.innerHTML = entries.map(([k, v]) => v.map(m => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--bg);border-radius:8px;margin-bottom:8px">
                <div>
                    <strong style="color:var(--primary)">${escape(k)}</strong>
                    <span style="color:var(--text-muted);margin-left:8px">→ ${m.obj}/${m.aux}</span>
                </div>
                <button class="filter-chip" onclick="removeKeyword('${k}','${m.obj}','${m.aux}')" style="padding:4px 10px;font-size:11px">✕</button>
            </div>
        `).join('')).join('');
    }

    function removeKeyword(k, o, a) {
        state.keywords[k] = state.keywords[k].filter(m => !(m.obj === o && m.aux === a));        if (!state.keywords[k].length) delete state.keywords[k];
        localStorage.setItem('hf_keywords', JSON.stringify(state.keywords));
        document.getElementById('customCount').textContent = Object.keys(state.keywords).length;
        renderKeywords();
        toast('Eliminado');
    }

    // Init
    window.onload = () => {
        const saved = localStorage.getItem('hf_keywords');
        if (saved) {
            state.keywords = JSON.parse(saved);
            document.getElementById('customCount').textContent = Object.keys(state.keywords).length;
        }
    };

    // Exponer funciones
    window.buscar = buscar;
    window.setLimit = setLimit;
    window.filterGroup = filterGroup;
    window.clearFilters = clearFilters;
    window.copiar = copiar;
    window.togglePanel = togglePanel;
    window.addKeyword = addKeyword;
    window.removeKeyword = removeKeyword;
    </script>
</body>
</html>
