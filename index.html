        // ============================================

        let limiteResultados = 20;

        // ============================================

        const keywordsMap = {

        // ============================================
        // 🔍 FUNCIONES DE BÚSQUEDA
        // ============================================
        
        function normalizar(texto) {
            if (!texto) return '';
            texto = texto.toLowerCase().trim();
            texto = texto.replace(/[áàäâ]/g, 'a');
            texto = texto.replace(/[éèëê]/g, 'e');
            texto = texto.replace(/[íìïî]/g, 'i');
            texto = texto.replace(/[óòöô]/g, 'o');
            texto = texto.replace(/[úùüû]/g, 'u');
            texto = texto.replace(/ñ/g, 'n');
            return texto;
        }

        function calcularRelevancia(query, item) {
            const queryNorm = normalizar(query);
            const textoCompleto = normalizar(`${item.objeto} ${item.auxiliar} ${item.denominacion} ${item.descripcion}`);
            const denomNorm = normalizar(item.denominacion);
            const descNorm = normalizar(item.descripcion);
            
            let score = 0;
            let keywordEncontrada = null;
            
            // 1. Búsqueda por keywords mapeadas
            if (keywordsMap[queryNorm]) {
                if (keywordsMap[queryNorm].includes(item.objeto)) {
                    score += 50;
                    keywordEncontrada = queryNorm;
                }
            }
            
            // 2. Coincidencia exacta en denominación
            if (denomNorm.includes(queryNorm)) {
                score += 40;
                if (!keywordEncontrada) keywordEncontrada = 'denominación';
            }
            
            // 3. Coincidencia en descripción
            if (descNorm.includes(queryNorm)) {
                score += 30;
                if (!keywordEncontrada) keywordEncontrada = 'descripción';
            }
            
            // 4. Coincidencia en código
            if (item.objeto.includes(queryNorm) || item.auxiliar.includes(queryNorm)) {
                score += 60;
                if (!keywordEncontrada) keywordEncontrada = 'código';
            }
            
            // 5. Búsqueda por palabras parciales
            const palabrasQuery = queryNorm.split(' ').filter(p => p.length > 2);
            palabrasQuery.forEach(palabra => {
                if (textoCompleto.includes(palabra)) {
                    score += 15;
                    if (!keywordEncontrada) keywordEncontrada = palabra;
                }
            });
            
            return {
                score: Math.min(score, 100),
                keyword: keywordEncontrada
            };
        }

        function buscar() {
            const query = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('results');
            
            // Debug: Mostrar en consola
            console.log('🔍 Búsqueda:', query);
            console.log('📊 Datos cargados:', datosCompletos.length);
            
            if (!query || query.length < 2) {
                resultsDiv.innerHTML = '<div class="error">⚠️ Ingresa al menos 2 caracteres para buscar</div>';
                return;
            }
            
            searchCount++;
            document.getElementById('searchCount').textContent = searchCount;
            
            resultsDiv.innerHTML = '<div class="loading">⏳ Buscando en ' + datosCompletos.length + ' registros...</div>';
            
            setTimeout(() => {
                let resultados = datosCompletos.map(item => {
                    const relevancia = calcularRelevancia(query, item);
                    return { 
                        ...item, 
                        relevancia: relevancia.score,
                        keywordEncontrada: relevancia.keyword
                    };
                });
                
                resultados = resultados.filter(r => r.relevancia >= 15);
                
                if (filtroGrupo) {
                    resultados = resultados.filter(r => r.grupo === filtroGrupo);
                }
                
                resultados.sort((a, b) => b.relevancia - a.relevancia);
                resultados = resultados.slice(0, limiteResultados);
                
                document.getElementById('ultimaBusqueda').textContent = resultados.length;
                
                console.log('✅ Resultados:', resultados.length);
                
                if (resultados.length === 0) {
                    resultsDiv.innerHTML = `

                            <p style="margin-top: 15px;">Intentá con otros términos o verificá la ortografía</p>

                        </div>
                    `;
                    return;

                    (de ${datosCompletos.length} registros totales)

                                <span class="codigo-badge">${r.objeto}/${r.auxiliar}</span>
                                <span class="relevancia-badge">📊 Relevancia: ${r.relevancia}%</span>
                            </div>
                            <div class="denominacion">${r.denominacion}</div>
                            <div class="descripcion">${r.descripcion}</div>
                            <div class="categoria-tag">📁 Grupo ${r.grupo}</div>
                            ${r.keywordEncontrada ? `<div class="keyword-match" style="display:inline-block;background:rgba(255,107,0,0.1);color:#ff6b00;padding:4px 10px;border-radius:8px;font-size:0.75em;margin-top:8px;">🏷️ Coincide en: ${r.keywordEncontrada}</div>` : ''}
                            ${index === 0 ? '<div style="margin-top: 10px; color: #ff6b00; font-weight: 600;">⭐ Mejor resultado</div>' : ''}
                        </div>
                    `;
                });
                
                resultsDiv.innerHTML = html;
            }, 300);
        }

        function selectResult(objeto, auxiliar) {
            const card = event.target.closest('.result-card');
            document.querySelectorAll('.result-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            
            const feedback = document.createElement('div');
            feedback.style.cssText = 'background: rgba(0,60,165,0.1); border: 2px solid #003ca5; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: center; color: #003ca5; font-weight: 600;';
            feedback.innerHTML = `✅ Objeto ${objeto}/${auxiliar} seleccionado`;
            
            const existingFeedback = document.querySelector('.ai-feedback');
            if (existingFeedback) existingFeedback.remove();
            feedback.classList.add('ai-feedback');
            document.getElementById('results').appendChild(feedback);
            
            setTimeout(() => {
                feedback.remove();
            }, 5000);
        }

        function setLimite(limite) {
            limiteResultados = limite;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.textContent.includes('resultados')) {
                    btn.classList.remove('active');
                    if (btn.textContent.includes(limite)) btn.classList.add('active');
                }
            });
        }

        function filtrarGrupo(grupo) {
            filtroGrupo = grupo;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.textContent.includes('Grupo')) {
                    btn.classList.remove('active');
                    if (btn.textContent.includes('Grupo ' + grupo)) btn.classList.add('active');
                }
            });
            buscar();
        }

        function limpiarFiltros() {
            filtroGrupo = '';
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes('20 resultados')) btn.classList.add('active');
            });
            document.getElementById('searchInput').value = '';
            document.getElementById('results').innerHTML = '';
            document.getElementById('ultimaBusqueda').textContent = '0';
        }

        // ============================================
        // 🚀 INICIALIZAR
        // ============================================
        window.onload = function() {
            const logoImg = document.getElementById('hospitalLogo');
            logoImg.onerror = function() {
                this.style.display = 'none';
            };
            
            document.getElementById('totalRegistros').textContent = datosCompletos.length;
            document.getElementById('totalObjetos').textContent = [...new Set(datosCompletos.map(d => d.objeto))].length;
            
            console.log('✅ Buscador cargado');
            console.log('📊 Registros:', datosCompletos.length);
            console.log('🎯 Objetos únicos:', [...new Set(datosCompletos.map(d => d.objeto))].length);
        };
    </script>
</body>
</html>
