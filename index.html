<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hospital de Flores - Clasificador Inteligente</title>

<style>
body {
    font-family: Arial;
    background: #f4f7fb;
    padding: 20px;
    color: #003ca5;
}

.header {
    display:flex;
    align-items:center;
    gap:20px;
    border-bottom:3px solid #003ca5;
    margin-bottom:20px;
}

.logo {
    height:60px;
}

input {
    padding:12px;
    border:2px solid #003ca5;
    border-radius:8px;
    width:300px;
}

button {
    padding:12px 20px;
    background:#003ca5;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.result {
    margin-top:20px;
    background:white;
    padding:20px;
    border-left:5px solid #003ca5;
    border-radius:10px;
}

.sugerencias span {
    background:#003ca5;
    color:white;
    padding:6px 12px;
    margin:5px;
    display:inline-block;
    cursor:pointer;
    border-radius:6px;
}

.panel {
    margin-top:20px;
    background:white;
    padding:15px;
    border-radius:10px;
    border:2px solid #003ca5;
}
</style>
</head>

<body>

<div class="header">
    <img src="logo_hospital_flores.png" class="logo" onerror="this.style.display='none'">
    <h2>🏥 Clasificador Inteligente - Contaduría</h2>
</div>

<input type="file" id="csvFile"><br><br>

<input type="text" id="searchInput" placeholder="Ej: carne, insumos..."
onkeypress="if(event.key==='Enter') buscar()">

<button onclick="buscar()">Buscar</button>

<div class="sugerencias" id="sugerencias"></div>

<div id="resultado"></div>

<!-- 🔥 PANEL PALABRAS -->
<div class="panel">
    <h3>➕ Agregar palabra personalizada</h3>
    <input id="palabra" placeholder="Ej: insumos">
    <input id="objeto" placeholder="Objeto (ej: 191)">
    <button onclick="guardarPalabra()">Guardar</button>
</div>

<script>

let datos = [];
let memoria = JSON.parse(localStorage.getItem('memoria') || '{}');
let palabras = JSON.parse(localStorage.getItem('palabras') || '{}');

// ================= CSV =================
function parseCSVLine(line){
    let r=[],c='',q=false;
    for(let ch of line){
        if(ch=='"') q=!q;
        else if(ch==','&&!q){ r.push(c); c=''; }
        else c+=ch;
    }
    r.push(c);
    return r;
}

document.getElementById('csvFile').addEventListener('change', function(e){
    const reader = new FileReader();
    reader.onload = function(e){
        const lines = e.target.result.split('\n');
        datos=[];

        for(let i=1;i<lines.length;i++){
            let c = parseCSVLine(lines[i]);
            if(c.length>=4){
                datos.push({
                    objeto:c[0].trim(),
                    auxiliar:c[1].trim(),
                    denominacion:c[2].replace(/^"|"$/g,'').trim(),
                    descripcion:c[3].replace(/^"|"$/g,'').trim()
                });
            }
        }
        alert("CSV cargado");
    };
    reader.readAsText(e.target.files[0]);
});

// ================= NORMALIZAR =================
function norm(t){
    return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

// ================= DEFINICIÓN =================
function definicion(item){
    return `Objeto ${item.objeto}: ${item.denominacion}`;
}

// ================= GUARDAR PALABRAS =================
function guardarPalabra(){
    const p = norm(document.getElementById('palabra').value);
    const o = document.getElementById('objeto').value.trim();

    if(!p || !o) return alert("Completar datos");

    palabras[p] = o;
    localStorage.setItem('palabras', JSON.stringify(palabras));

    alert("Guardado");
}

// ================= BUSCAR =================
function buscar(){

    const q = norm(document.getElementById('searchInput').value);
    const div = document.getElementById('resultado');

    if(!q){ div.innerHTML="Escribí algo"; return; }

    let resultado;

    // 1. MEMORIA
    if(memoria[q]){
        resultado = datos.find(d =>
            d.objeto === memoria[q].objeto &&
            d.auxiliar === memoria[q].auxiliar
        );
    }

    // 2. PALABRAS PERSONALIZADAS
    if(!resultado && palabras[q]){
        resultado = datos.find(d => d.objeto === palabras[q]);
    }

    // 3. REGLA ALIMENTOS
    if(!resultado && ['carne','arroz','harina','pan','leche'].some(a=>q.includes(a))){
        resultado = datos.find(d => d.objeto === '111');
    }

    // 4. BÚSQUEDA SIMPLE
    if(!resultado){
        resultado = datos.find(d =>
            norm(d.denominacion + d.descripcion).includes(q)
        );
    }

    if(!resultado){
        div.innerHTML="No encontrado";
        return;
    }

    // 🔥 CONFIRMAR APRENDIZAJE
    if(confirm("¿Este resultado es correcto?")){
        memoria[q] = {
            objeto: resultado.objeto,
            auxiliar: resultado.auxiliar
        };
        localStorage.setItem('memoria', JSON.stringify(memoria));
    }

    div.innerHTML = `
        <div class="result">
            <b>${resultado.objeto}/${resultado.auxiliar}</b><br><br>
            <b>${resultado.denominacion}</b><br><br>
            ${resultado.descripcion}<br><br>
            🤖 ${definicion(resultado)}
        </div>
    `;
}

// ================= SUGERENCIAS =================
const sug = ['carne','insumos','medicamento','limpieza'];

document.getElementById('sugerencias').innerHTML =
    sug.map(s=>`<span onclick="document.getElementById('searchInput').value='${s}';buscar()">${s}</span>`).join('');

</script>

</body>
</html>
