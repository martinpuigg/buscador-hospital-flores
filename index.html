<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificador Inteligente - Hospital de Flores</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #003ca5; --orange: #ff6b00; --green: #28a745; --bg: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); padding: 10px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Cabecera */
        .header { border-bottom: 3px solid var(--blue); margin-bottom: 20px; padding-bottom: 10px; display: flex; flex-direction: column; gap: 5px; }
        @media (min-width: 600px) { .header { flex-direction: row; justify-content: space-between; align-items: center; } }
        .header h1 { color: var(--blue); font-size: 1.3em; }

        /* Panel de Clave IA */
        .ai-box { background: #f8f9fa; border: 2px solid var(--orange); padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        .api-input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 6px; margin-top: 5px; font-size: 0.9em; outline: none; }

        /* Buscador Principal */
        .search-section { background: var(--blue); padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        @media (min-width: 600px) { .search-section { flex-direction: row; } }
        #q { flex: 1; padding: 12px; border-radius: 6px; border: none; font-size: 1em; outline: none; }
        #b { padding: 12px 25px; background: var(--orange); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #b:disabled { background: #999; cursor: not-allowed; }

        /* Diccionario Interno */
        .toggle-btn { width: 100%; padding: 10px; background: var(--green); color: white; border: none; border-radius: 6px; margin: 15px 0; font-weight: 600; cursor: pointer; }
        .dic-panel { display: none; background: #f0fff4; border: 2px solid var(--green); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .dic-form { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media (min-width: 600px) { .dic-form { grid-template-columns: 2fr 1fr 1fr auto; align-items: end; } }
        .dic-form input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9em; }

        /* Resultados de la IA (Recuadro Naranja) */
        .ia-res { display: none; background: #fff5f0; border: 2px solid var(--orange); padding: 15px; border-radius: 10px; margin-top: 15px; }
        .ia-res h4 { color: var(--orange); font-size: 0.9em; margin-bottom: 5px; }
        .ia-res p { font-size: 0.95em; line-height: 1.4; }

        /* Tarjetas de Objetos */
        .card { border-left: 5px solid var(--blue); padding: 15px; background: white; margin-top: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-radius: 6px; border: 1px solid #eee; }
        .card .code { background: var(--blue); color: white; padding: 3px 10px; border-radius: 12px; font-weight: bold; font-size: 0.8em; display: inline-block; margin-bottom: 5px; }
        .keyword-item { background: white; padding: 8px; border-radius: 4px; margin-bottom: 5px; display: flex; justify-content: space-between; border: 1px solid #ddd; font-size: 0.85em; }
        .loading { text-align: center; padding: 20px; color: var(--blue); font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🏥 Hospital de Flores</h1>
                <p style="font-size: 0.8em; color: #666;">Buscador Inteligente (1.925 Objetos de Gasto)</p>
            </div>
            <div id="status" style="font-size: 0.7em; font-weight: bold; color: var(--green);">SISTEMA CONECTADO</div>
        </div>

        <div class="ai-box">
            <label style="font-weight:bold; color:var(--orange); font-size: 0.85em;">🤖 Gemini API Key (IA):</label>
            <input type="password" id="key" class="api-input" placeholder="Pega tu clave AIzaSy aquí...">
        </div>

        <div class="search-section">
            <input type="text" id="q" placeholder="Ej: asado, jeringas, repuesto ambulancia..." onkeypress="if(event.key==='Enter') buscar()">
            <button id="b" onclick="buscar()">ANALIZAR</button>
        </div>

        <button class="toggle-btn" onclick="toggleDic()">📝 Diccionario de Reglas del Hospital</button>
        <div id="dic" class="dic-panel">
            <div class="dic-form">
                <input type="text" id="nk" placeholder="Nombre">
                <input type="text" id="no" placeholder="Objeto (3 dig)">
                <input type="text" id="na" placeholder="Aux (000)" value="000">
                <button onclick="addK()" style="background:var(--green); color:white; border:none; padding:10px; border-radius:4px; cursor:pointer;">GUARDAR</button>
            </div>
            <div id="klist" style="margin-top:10px;"></div>
        </div>

        <div id="ia" class="ia-res"></div>
        <div id="res"></div>
    </div>
