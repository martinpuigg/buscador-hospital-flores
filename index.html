<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificador Hospital de Flores - SISTEMA ESTABLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #003ca5; --orange: #ff6b00; --green: #28a745; --bg: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); padding: 10px; color: #333; line-height: 1.4; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        .header { border-bottom: 3px solid var(--blue); margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: var(--blue); font-size: 1.1em; text-transform: uppercase; }

        /* Cargador de Excel */
        #uploadSection { background: #eef2f7; padding: 25px; border-radius: 10px; text-align: center; border: 2px dashed var(--blue); margin-bottom: 20px; }
        .btn-blue { background: var(--blue); color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; display: inline-block; border: none; }

        /* IA y Buscador */
        .api-box { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .api-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; margin-top: 5px; font-size: 0.9em; }
        
        .search-area { background: var(--blue); padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        @media (min-width: 600px) { .search-area { flex-direction: row; } }
        #q { flex: 1; padding: 12px; border-radius: 6px; border: none; font-size: 1em; outline: none; }
        #b { padding: 12px 25px; background: var(--orange); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; min-width: 140px; }
        #b:disabled { background: #999; }

        /* Resultados IA con Definición */
        #iaPanel { display: none; background: #fff5f0; border: 2px solid var(--orange); padding: 15px; border-radius: 10px; margin: 15px 0; }
        .ia-title { color: var(--orange); font-weight: 800; font-size: 0.8em; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .ia-def { font-size: 1em; color: #222; font-style: italic; margin-bottom: 10px; }

        /* Diccionario Interno */
        .dic-toggle { width: 100%; padding: 10px; background: var(--green); color: white; border: none; border-radius: 6px; margin: 15px 0; font-weight: 600; cursor: pointer; }
        .dic-content { display: none; background: #f0fff4; border: 1px solid var(--green); padding: 15px; border-radius: 10px; }
        .rule-item { display: flex; justify-content: space-between; background: white; padding: 8px; border-radius: 4px; margin-bottom: 5px; border: 1px solid #ddd; font-size: 0.85em; }

        /* Tarjetas del Excel */
        .card { border-left: 6px solid var(--blue); padding: 15px; background: white; margin-top: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 6px; }
        .card.ia-match { border-left-color: var(--orange); background: #fffaf5; }
        .badge { background: var(--blue); color: white; padding: 3px 10px; border-radius: 12px; font-weight: bold; font-size: 0.8em; }

        .loading { text-align: center; padding: 20px; font-weight: bold; color: var(--blue); }
        .footer-links { text-align: center; margin-top: 30px; font-size: 0.7em; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Hospital de Flores</h1>
            <div id="dbIndicator" style="font-size: 0.7em; font-weight: bold;">SIN BASE DE DATOS</div>
        </div>

        <div id="uploadArea">
            <h2 style="color: var(--blue); font-size: 1em;">📂 Paso 1: Carga el archivo ObjetosGasto.csv</h2>
            <p style="font-size: 0.8em; color: #666; margin: 10px 0;">Solo se hace una vez por computadora.</p>
            <label class="btn-blue">
                SELECCIONAR CSV
                <input type="file" id="csvFile" accept=".csv" style="display:none;">
            </label>
        </div>

        <div id="appInterface" style="display:none;">
            <div class="api-box">
                <label style="font-weight:bold; color:var(--orange); font-size: 0.8em;">🤖 Clave API Gemini:</label>
                <input type="password" id="apiKey" class="api-input" placeholder="Pega tu clave aquí...">
            </div>

            <div class="search-area">
                <input type="text" id="q" placeholder="Ej: Atún, Jeringas, 152, Reparación..." onkeypress="if(event.key==='Enter') buscar()">
                <button id="b" onclick="buscar()">ANALIZAR</button>
            </div>

            <div id="iaPanel">
                <span class="ia-title">🤖 Asociación e Inteligencia:</span>
                <div id="iaDef" class="ia-def"></div>
                <div id="iaCode" style="font-weight: bold; color: var(--orange);"></div>
            </div>

            <div id="results"></div>

            <button class="dic-toggle" onclick="toggleDic()">📝 Mi Diccionario de Reglas</button>
            <div id="dicPanel" class="dic-content">
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <input type="text" id="nk" placeholder="Palabra" style="flex:2; padding:8px; border:1px solid #ccc;">
                    <input type="text" id="no" placeholder="Objeto" style="flex:1; padding:8px; border:1px solid #ccc;">
                    <button onclick="saveRule()" style="background:var(--green); color:white; border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">OK</button>
                </div>
                <div id="rulesList"></div>
            </div>

            <div class="footer-links">
                <span style="cursor:pointer; text-decoration:underline;" onclick="resetAll()">⚠️ Borrar Todo y Reiniciar</span>
            </div>
        </div>
    </div>

    <script>
        let DATA_EXCEL = [];
        let MI_DICCIONARIO = JSON.parse(localStorage.getItem('hosp_dic_vFinal') || '{}');
        let MEMORIA_IA = JSON.parse(localStorage.getItem('hosp_ai_cache_vFinal') || '{}');
        let estaBuscando = false;

        window.onload = () => {
            document.getElementById('apiKey').value = localStorage.getItem('hosp_key_vFinal') || '';
            const savedDB = localStorage.getItem('hosp_db_vFinal');
            if (savedDB) {
                DATA_EXCEL = JSON.parse(savedDB);
                mostrarApp();
            }
            renderRules();
        };

        function mostrarApp() {
            document.getElementById('uploadArea').style.display = 'none';
            document.getElementById('appInterface').style.display = 'block';
            document.getElementById('dbIndicator').innerText = `✅ ${DATA_EXCEL.length} OBJETOS LISTOS`;
            document.getElementById('dbIndicator').style.color = "var(--green)";
        }

        // --- CARGA DE ARCHIVO ---
        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const lineas = event.target.result.split(/\r?\n/);
                const tmp = [];
                for (let i = 1; i < lineas.length; i++) {
                    const col = lineas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (col.length >= 3) {
                        tmp.push({
                            o: col[0].replace(/"/g, '').trim(),
                            a: col[1].replace(/"/g, '').trim() || "000",
                            n: col[2].replace(/"/g, '').trim(),
                            d: (col[3] || "").replace(/"/g, '').trim()
                        });
                    }
                }
                if (tmp.length > 0) {
                    localStorage.setItem('hosp_db_vFinal', JSON.stringify(tmp));
                    location.reload();
                }
            };
            reader.readAsText(file, 'ISO-8859-1');
        });

        // --- DICCIONARIO ---
        function toggleDic() { const p = document.getElementById('dicPanel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
        function saveRule() {
            const k = document.getElementById('nk').value.toLowerCase().trim();
            const o = document.getElementById('no').value.trim();
            if(k && o) {
                MI_DICCIONARIO[k] = o;
                localStorage.setItem('hosp_dic_vFinal', JSON.stringify(MI_DICCIONARIO));
                renderRules();
                document.getElementById('nk').value = '';
                document.getElementById('no').value = '';
            }
        }
        function deleteRule(k) {
            delete MI_DICCIONARIO[k];
            localStorage.setItem('hosp_dic_vFinal', JSON.stringify(MI_DICCIONARIO));
            renderRules();
        }
        function renderRules() {
            const list = document.getElementById('rulesList');
            list.innerHTML = '';
            for(let k in MI_DICCIONARIO) {
                list.innerHTML += `<div class="rule-item"><span><b>${k}</b> ➔ Objeto ${MI_DICCIONARIO[k]}</span><span style="color:red; cursor:pointer;" onclick="deleteRule('${k}')">✖</span></div>`;
            }
        }

        // --- MOTOR DE BÚSQUEDA ---
        async function buscar() {
            if(estaBuscando) return;
            const query = document.getElementById('q').value.trim();
            if(query.length < 2) return;

            estaBuscando = true;
            const btn = document.getElementById('b');
            const resDiv = document.getElementById('results');
            const iaPanel = document.getElementById('iaPanel');
            
            btn.disabled = true; btn.innerText = "⏳...";
            resDiv.innerHTML = '<div class="loading">Buscando localmente...</div>';
            iaPanel.style.display = 'none';

            const queryL = query.toLowerCase();

            // 1. Prioridad: ¿Está en mi Diccionario?
            let manualCode = MI_DICCIONARIO[queryL] || null;

            // 2. Buscar en el Excel
            let locales = DATA_EXCEL.filter(i => i.n.toLowerCase().includes(queryL) || i.o === query || i.o === manualCode);

            if (locales.length > 0) {
                mostrarCards(locales, false);
                // Igual lanzamos la IA por si aporta definición, pero sin bloquear
                consultarIA(query);
            } else {
                // 3. No hay nada local, forzar IA
                resDiv.innerHTML = '<div class="loading">🤖 Analizando en la web con IA...</div>';
                await consultarIA(query);
            }

            estaBuscando = false; btn.disabled = false; btn.innerText = "ANALIZAR";
        }

        async function consultarIA(query) {
            const key = document.getElementById('apiKey').value.trim();
            const iaPanel = document.getElementById('iaPanel');
            const iaDef = document.getElementById('iaDef');
            
            if(!key) return;
            localStorage.setItem('hosp_key_vFinal', key);

            if(MEMORIA_IA[query.toLowerCase()]) {
                mostrarResultadoIA(MEMORIA_IA[query.toLowerCase()]);
                return;
            }

            try {
                const prompt = `Actúa como experto contable de Uruguay. Analiza el gasto: "${query}". 
                Responde únicamente en este formato JSON:
                {"codigo": "número de 3 dígitos", "definicion": "explicación de qué es el producto y por qué pertenece a ese objeto de gasto en el clasificador CGN"}`;

                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await resp.json();
                let text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                const aiObj = JSON.parse(text);

                if(aiObj.codigo) {
                    MEMORIA_IA[query.toLowerCase()] = aiObj;
                    localStorage.setItem('hosp_ai_cache_vFinal', JSON.stringify(MEMORIA_IA));
                    mostrarResultadoIA(aiObj);
                }
            } catch (e) { console.error("Error IA"); }
        }

        function mostrarResultadoIA(aiObj) {
            const iaPanel = document.getElementById('iaPanel');
            const iaDef = document.getElementById('iaDef');
            const resDiv = document.getElementById('results');

            iaPanel.style.display = 'block';
            iaDef.innerHTML = `"${aiObj.definicion}"`;

            // Buscar la tarjeta oficial del Excel para ese código
            const tarjetasIA = DATA_EXCEL.filter(i => i.o === aiObj.codigo);
            if(tarjetasIA.length > 0) {
                // Si la pantalla estaba vacía o cargando, mostramos la tarjeta
                if(resDiv.innerHTML.includes("loading") || resDiv.innerHTML.includes("Buscando")) {
                    mostrarCards(tarjetasIA, true);
                }
            }
        }

        function mostrarCards(items, esIA) {
            const resDiv = document.getElementById('results');
            if(!esIA) resDiv.innerHTML = ''; 
            else resDiv.innerHTML = '<p style="font-size:0.7em; font-weight:bold; color:var(--orange); margin-bottom:5px;">TARJETA ASOCIADA POR IA:</p>';

            items.slice(0, 25).forEach(r => {
                resDiv.innerHTML += `
                    <div class="card ${esIA ? 'ia-match' : ''}">
                        <span class="badge">OBJETO ${r.o} / ${r.a}</span>
                        <h3 style="margin:8px 0 4px 0; color:var(--blue); font-size:1em;">${r.n}</h3>
                        <p style="color:#666; font-size:0.85em;">${r.d}</p>
                    </div>`;
            });
        }

        function resetAll() { if(confirm("¿Borrar base de datos, diccionario y memoria?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
