<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificador Hospital de Flores - Anti-Trancazos</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #003ca5; --orange: #ff6b00; --green: #28a745; --bg: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); padding: 10px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { border-bottom: 3px solid var(--blue); margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: var(--blue); font-size: 1.2em; }
        #uploadSection { background: #eef2f7; padding: 30px; border-radius: 10px; text-align: center; border: 2px dashed var(--blue); margin-bottom: 20px; }
        .btn-file { background: var(--blue); color: white; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; display: inline-block; }
        .ai-box { background: #f8f9fa; border: 2px solid var(--orange); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .api-input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 6px; margin-top: 8px; }
        .search-area { background: var(--blue); padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        @media (min-width: 600px) { .search-area { flex-direction: row; } }
        #q { flex: 1; padding: 12px; border-radius: 6px; border: none; font-size: 1em; outline: none; }
        #b { padding: 12px 25px; background: var(--orange); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; min-width: 150px; }
        #b:disabled { background: #999; cursor: not-allowed; }
        .toggle-btn { width: 100%; padding: 10px; background: var(--green); color: white; border: none; border-radius: 6px; margin: 15px 0; font-weight: 600; cursor: pointer; }
        .dic-panel { display: none; background: #f0fff4; border: 2px solid var(--green); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .ia-status-msg { display: none; background: #fff5f0; border: 1px solid var(--orange); padding: 15px; border-radius: 8px; margin-top: 15px; color: #d35400; font-size: 0.95em; }
        .card { border-left: 6px solid var(--blue); padding: 15px; background: white; margin-top: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 6px; }
        .card.ia-found { border-left-color: var(--orange); background: #fffaf5; }
        .code-badge { background: var(--blue); color: white; padding: 4px 12px; border-radius: 15px; font-weight: bold; font-size: 0.85em; }
        .loading { text-align: center; padding: 20px; font-weight: bold; color: var(--blue); }
        .reset-db { font-size: 0.7em; color: #999; cursor: pointer; text-decoration: underline; margin-top: 30px; display: block; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Hospital de Flores</h1>
            <div id="dbStatus" style="font-size: 0.7em; font-weight: bold;">ESPERANDO BASE DE DATOS...</div>
        </div>

        <div id="uploadSection">
            <h2 style="color: var(--blue); font-size: 1.2em;">📂 Carga de Objetos</h2>
            <label class="btn-file"> SELECCIONAR CSV <input type="file" id="csvFile" accept=".csv" style="display:none;"></label>
        </div>

        <div id="mainApp" style="display:none;">
            <div class="ai-box">
                <label style="font-weight:bold; color:var(--orange); font-size: 0.8em;">🤖 Gemini API Key:</label>
                <input type="password" id="key" class="api-input" placeholder="Pega tu clave AIzaSy...">
            </div>

            <div class="search-area">
                <input type="text" id="q" placeholder="Ej: Atun, Jeringa, 111..." onkeypress="if(event.key==='Enter') buscar()">
                <button id="b" onclick="buscar()">ANALIZAR</button>
            </div>

            <button class="toggle-btn" onclick="toggleDic()">📝 Diccionario de Reglas</button>
            <div id="dic" class="dic-panel">
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <input type="text" id="nk" placeholder="Palabra" style="flex:2; padding:8px;">
                    <input type="text" id="no" placeholder="Objeto" style="flex:1; padding:8px;">
                    <button onclick="addK()" style="background:var(--green); color:white; border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">OK</button>
                </div>
                <div id="klist" style="font-size: 0.8em; max-height: 150px; overflow-y: auto;"></div>
            </div>

            <div id="iaStatus" class="ia-status-msg"></div>
            <div id="results"></div>
            <span class="reset-db" onclick="resetDatabase()">⚠️ Borrar datos guardados</span>
        </div>
    </div>

    <script>
        let DB_LOCAL = [];
        let dics = JSON.parse(localStorage.getItem('h_dic') || '{}');
        let cacheIA = JSON.parse(localStorage.getItem('h_cache_ia') || '{}');
        let isBusy = false;

        window.onload = () => {
            document.getElementById('key').value = localStorage.getItem('h_key') || '';
            renderD();
            checkDatabase();
        };

        function checkDatabase() {
            const saved = localStorage.getItem('hospital_db');
            if (saved) {
                DB_LOCAL = JSON.parse(saved);
                document.getElementById('uploadSection').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('dbStatus').innerText = `✅ ${DB_LOCAL.length} OBJETOS LISTOS`;
                document.getElementById('dbStatus').style.color = "var(--green)";
            }
        }

        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => procesarCSV(event.target.result);
            reader.readAsText(file, 'ISO-8859-1');
        });

        function procesarCSV(texto) {
            const lineas = texto.split(/\r?\n/);
            const dataProcesada = [];
            for (let i = 1; i < lineas.length; i++) {
                const col = lineas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (col.length >= 3) {
                    dataProcesada.push({
                        o: col[0].replace(/"/g, '').trim(),
                        a: col[1].replace(/"/g, '').trim() || "000",
                        n: col[2].replace(/"/g, '').trim(),
                        d: (col[3] || "").replace(/"/g, '').trim()
                    });
                }
            }
            if (dataProcesada.length > 0) {
                localStorage.setItem('hospital_db', JSON.stringify(dataProcesada));
                checkDatabase();
            }
        }

        function resetDatabase() { if(confirm("¿Borrar todo?")) { localStorage.removeItem('hospital_db'); location.reload(); } }
        function toggleDic() { let d = document.getElementById('dic'); d.style.display = d.style.display==='block' ? 'none' : 'block'; }
        function addK() {
            let k = document.getElementById('nk').value.toLowerCase().trim();
            let o = document.getElementById('no').value.trim();
            if(k && o) { dics[k] = {o, a:"000"}; localStorage.setItem('h_dic', JSON.stringify(dics)); renderD(); }
        }
        function delK(k) { delete dics[k]; localStorage.setItem('h_dic', JSON.stringify(dics)); renderD(); }
        function renderD() {
            let l = document.getElementById('klist'); l.innerHTML = '';
            for(let k in dics) l.innerHTML += `<div style="display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid #eee;"><span><b>${k}</b> ➔ ${dics[k].o}</span><span onclick="delK('${k}')" style="color:red; cursor:pointer;">✖</span></div>`;
        }

        async function buscar() {
            if(isBusy) return;
            const query = document.getElementById('q').value.trim();
            if(query.length < 2) return;

            isBusy = true;
            const btn = document.getElementById('b');
            const resDiv = document.getElementById('results');
            const statusDiv = document.getElementById('iaStatus');
            
            btn.innerText = "⏳..."; btn.disabled = true;
            resDiv.innerHTML = '<div class="loading">Buscando...</div>';
            statusDiv.style.display = 'none';

            let qL = query.toLowerCase();
            let targetCode = dics[qL] ? dics[qL].o : null;
            let matches = DB_LOCAL.filter(i => i.n.toLowerCase().includes(qL) || i.o === query || i.o === targetCode);

            if (matches.length > 0) {
                mostrarCards(matches, false, query);
                liberar();
            } else {
                statusDiv.style.display = 'block';
                statusDiv.innerHTML = `🤖 No está en el Excel. Consultando a Google...`;
                
                try {
                    let aiCode = await consultarIA(query);
                    if (aiCode) {
                        let aiMatches = DB_LOCAL.filter(i => i.o === aiCode);
                        if (aiMatches.length > 0) {
                            statusDiv.innerHTML = `✨ IA identificó "${query}" como Objeto ${aiCode}`;
                            mostrarCards(aiMatches, true, query);
                        } else {
                            resDiv.innerHTML = `<div class="card ia-found"><h3>Sugerencia IA: Objeto ${aiCode}</h3><p>Asociado a "${query}". Este código no está en tu archivo.</p></div>`;
                        }
                    } else {
                        resDiv.innerHTML = '<p style="text-align:center; padding:20px;">Sin resultados.</p>';
                    }
                } catch (err) {
                    statusDiv.innerHTML = `⚠️ La IA tardó demasiado o falló el internet.`;
                } finally {
                    liberar();
                }
            }
        }

        async function consultarIA(q) {
            const key = document.getElementById('key').value.trim();
            if (!key) return null;
            localStorage.setItem('h_key', key);
            if(cacheIA[q.toLowerCase()]) return cacheIA[q.toLowerCase()];

            // CONFIGURACIÓN DE TIEMPO LÍMITE (15 segundos)
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);

            try {
                const prompt = `Actúa como experto contable de Uruguay. Analiza: "${q}". ¿A qué OBJETO DE GASTO (011-923) pertenece? Responde SOLO el número de 3 dígitos.`;
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: "POST", 
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                const d = await r.json();
                const code = d.candidates[0].content.parts[0].text.trim().substring(0,3);
                if (!isNaN(code)) {
                    cacheIA[q.toLowerCase()] = code;
                    localStorage.setItem('h_cache_ia', JSON.stringify(cacheIA));
                    return code;
                }
            } catch (e) { return null; }
        }

        function mostrarCards(items, esIA, qOrig) {
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = esIA ? `<p style="font-size:0.7em; font-weight:bold; color:var(--orange); margin:15px 0 5px 0;">ASOCIADO POR INTELIGENCIA ARTIFICIAL:</p>` : '';
            items.slice(0, 30).forEach(r => {
                resDiv.innerHTML += `<div class="card ${esIA ? 'ia-found' : ''}"><span class="code-badge">OBJETO ${r.o} / ${r.a}</span><h3 style="margin:8px 0 4px 0; color:var(--blue); font-size:1em;">${r.n}</h3><p style="color:#666; font-size:0.8em; line-height:1.4;">${r.d}</p></div>`;
            });
        }

        function liberar() { isBusy = false; const b = document.getElementById('b'); b.innerText = "ANALIZAR"; b.disabled = false; }
    </script>
</body>
</html>
