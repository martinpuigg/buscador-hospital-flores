// Agregar esta función al final del <script>
async function buscarEnInternet(query) {
    const internetDiv = document.getElementById('internetResults') || crearInternetDiv();
    const queryNorm = normalizar(query);
    
    // Verificar si ya está en el diccionario local
    if (customKeywords[queryNorm] || Object.values(motorIALocal).some(cat => 
        cat.keywords.some(kw => normalizar(kw).includes(queryNorm)))) {
        return; // Ya está cubierto localmente
    }
    
    internetDiv.style.display = 'block';
    internetDiv.innerHTML = `
        <div class="loading" style="background: #fff5f0; border-left: 4px solid #ff6b00;">
            🌐 <strong>Buscando en Internet...</strong><br>
            <small>Analizando "${query}" en fuentes contables uruguayas</small>
        </div>
    `;
    
    try {
        // Búsqueda optimizada para contabilidad uruguaya
        const searchQuery = encodeURIComponent(`"${query}" "objeto de gasto" CGN Uruguay site:gov.uy OR site:opret.com.uy OR site:agesic.gub.uy`);
        const searchUrl = `https://www.google.com/search?q=${searchQuery}`;
        
        // Usar un proxy simple o scraping básico (ejemplo con fetch)
        // Nota: Para producción, usarías un backend o servicio de scraping
        const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(searchUrl)}`);
        const data = await response.json();
        const html = data.contents;
        
        // Análisis simple de resultados (esto es un ejemplo básico)
        const resultados = analizarResultadosWeb(html, query);
        
        mostrarResultadosWeb(resultados, query);
        
    } catch (error) {
        console.warn('Error en búsqueda web:', error);
        internetDiv.innerHTML = `
            <div style="background: #fff3cd; border: 1px solid #ffeeba; color: #856404; padding: 15px; border-radius: 8px;">
                🌐 Búsqueda web temporalmente no disponible. 
                <br>El sistema sigue funcionando perfectamente con el motor local.
                <br><button onclick="toggleCustomKeywordsPanel()" style="background: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 4px; margin-top: 5px; cursor: pointer;">📝 Agregar manualmente</button>
            </div>
        `;
    }
}

function analizarResultadosWeb(html, query) {
    // Análisis básico de resultados web (simplificado)
    const resultados = {
        descripcion: '',
        objetos_posibles: [],
        fuentes: []
    };
    
    // Buscar patrones de objetos de gasto (3 dígitos)
    const codigosRegex = /(\d{3})/g;
    let match;
    const codigosEncontrados = [];
    
    while ((match = codigosRegex.exec(html)) !== null) {
        const codigo = match[1];
        // Filtrar códigos que podrían ser objetos de gasto (100-399)
        if (codigo >= 100 && codigo <= 399 && !codigosEncontrados.includes(codigo)) {
            codigosEncontrados.push(codigo);
        }
    }
    
    // Buscar descripciones útiles
    if (html.includes('CGN') || html.includes('Comptroller')) {
        resultados.descripcion = 'Término relacionado con normativa contable uruguaya. ';
    }
    
    if (query.includes('medic') || query.includes('hospital')) {
        resultados.descripcion += 'Contexto médico/hospitalario detectado. ';
        resultados.objetos_posibles = ['152', '194', '195']; // Medicamentos e insumos
    } else if (query.includes('alimento') || query.includes('comida')) {
        resultados.descripcion += 'Categoría de consumos/alimentos. ';
        resultados.objetos_posibles = ['111', '112'];
    } else if (query.includes('servicio') || query.includes('mantenimiento')) {
        resultados.descripcion += 'Servicio o mantenimiento. ';
        resultados.objetos_posibles = ['211', '271', '272'];
    }
    
    resultados.objetos_posibles.push(...codigosEncontrados.slice(0, 3)); // Top 3 códigos
    resultados.fuentes = ['Fuentes oficiales uruguayas'];
    
    return resultados;
}

function mostrarResultadosWeb(resultados, queryOriginal) {
    const internetDiv = document.getElementById('internetResults');
    
    let html = `
        <div style="background: #e8f5e8; padding: 20px; border-radius: 10px; border-left: 4px solid #28a745;">
            <h4 style="color: #28a745; margin-bottom: 12px;">🌐 Resultados de Búsqueda Web:</h4>
            <div style="font-size: 1em; color: #333; margin-bottom: 15px; line-height: 1.5;">
                ${resultados.descripcion || 'Se encontró información general sobre el término.'}
                <br><small>Fuentes: ${resultados.fuentes.join(', ')}</small>
            </div>
    `;
    
    if (resultados.objetos_posibles.length > 0) {
        html += `
            <div style="background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 15px;">
                <strong style="color: #003ca5;">💡 Objetos sugeridos por análisis web:</strong><br>
                ${resultados.objetos_posibles.map(codigo => 
                    `<span style="background: #e3f2fd; color: #003ca5; padding: 4px 8px; border-radius: 4px; margin: 2px; display: inline-block;">${codigo}</span>`
                ).join('')}
            </div>
        `;
        
        // Botones para guardar sugerencias
        resultados.objetos_posibles.forEach((codigoCompleto, index) => {
            const objeto = codigoCompleto.substring(0, 3);
            const auxiliar = codigoCompleto.substring(3) || '000';
            
            html += `
                <button class="ai-save-btn" onclick="guardarSugerenciaWeb('${queryOriginal}', '${objeto}', '${auxiliar}')" 
                        style="background: #ff6b00; margin: 5px; width: auto; padding: 10px 15px; font-size: 0.95em;">
                    📝 Guardar: Objeto ${objeto}/${auxiliar}
                </button>
            `;
        });
    } else {
        html += `
            <div style="background: #fff3cd; padding: 10px; border-radius: 6px; margin: 10px 0;">
                <strong>ℹ️ No se encontraron códigos específicos.</strong><br>
                El análisis web no identificó objetos de gasto directos. Podés agregar esta regla manualmente.
            </div>
        `;
    }
    
    html += `
            <button onclick="this.parentElement.style.display='none'" 
                    style="background: none; border: none; color: #666; cursor: pointer; float: right; font-size: 0.9em;">
                ✕ Ocultar resultados web
            </button>
        </div>
    `;
    
    internetDiv.innerHTML = html;
}

// Función para crear el contenedor de resultados web si no existe
function crearInternetDiv() {
    const div = document.createElement('div');
    div.id = 'internetResults';
    div.className = 'internet-results';
    div.style.cssText = `
        display: none; 
        background: #fff5f0; 
        border: 2px solid #ff6b00; 
        padding: 25px; 
        border-radius: 10px; 
        margin-bottom: 25px;
    `;
    document.getElementById('searchContainer').insertBefore(div, document.getElementById('localResults'));
    return div;
}

// Función para guardar sugerencias desde web
function guardarSugerenciaWeb(keyword, objeto, auxiliar) {
    document.getElementById('newKeyword').value = keyword.toLowerCase();
    document.getElementById('newObjeto').value = objeto;
    document.getElementById('newAuxiliar').value = auxiliar;
    
    // Auto-guardar
    setTimeout(() => {
        addCustomKeyword();
        document.getElementById('internetResults').style.display = 'none';
    }, 100);
}

// Modificar la función buscar() para incluir búsqueda web
function buscar() {
    const query = document.getElementById('searchInput').value.trim();
    const resultsDiv = document.getElementById('results');
    
    if (!query || query.length < 2) {
        showMessage('Ingresa al menos 2 caracteres para buscar.', 'error');
        return;
    }
    
    searchCount++; 
    document.getElementById('searchCount').textContent = searchCount;
    resultsDiv.innerHTML = '<div class="loading">⏳ Analizando con IA local...</div>';
    
    // 1. Primero el análisis local
    const analisis = analizarConIA_local(query);
    mostrarAnalisisLocal(analisis, query);
    
    // 2. Si la confianza local es baja, buscar en web
    if (analisis.confianza < 60) {
        setTimeout(() => buscarEnInternet(query), 800);
    }
    
    // 3. Búsqueda en base de datos (igual que antes)
    setTimeout(() => {
        let resultados = datosCompletos
            .map(item => ({ 
                ...item, 
                ...calcularRelevanciaAvanzada(query, item) 
            }))
            .filter(r => r.score >= 10)
            .sort((a, b) => b.score - a.score);
        
        if (filtroGrupo) {
            resultados = resultados.filter(r => r.grupo === filtroGrupo);
        }
        
        resultados = resultados.slice(0, limiteResultados);
        document.getElementById('ultimaBusqueda').textContent = resultados.length;
        
        // Renderizar resultados (igual que antes)
        renderizarResultados(resultados);
    }, 500);
}

function mostrarAnalisisLocal(analisis, query) {
    const localResultsDiv = document.getElementById('localResults');
    const confianzaTexto = analisis.confianza >= 80 ? 'Alta' : 
                          analisis.confianza >= 60 ? 'Media' : 'Baja - Buscando en web...';
    
    localResultsDiv.style.display = 'block';
    document.getElementById('localAnalysis').innerHTML = `
        <strong>Categoría:</strong> ${analisis.categoria.replace(/([A-Z])/g, ' $1').trim()}<br>
        <strong>Confianza local:</strong> ${confianzaTexto} (${analisis.confianza}%)<br>
        <strong>Análisis:</strong> ${analisis.explicacion}<br>
        ${analisis.objetos_sugeridos.length > 0 ? 
            `<strong>Objetos locales:</strong> ${analisis.objetos_sugeridos.join(', ')}` : 
            `<em style="color: #ff6b00;">Buscando información adicional en Internet...</em>`
        }
    `;
}
