<script>
let datosCompletos = [];
let limiteResultados = 20;
let filtroGrupo = '';
let searchCount = 0;
let customKeywords = {};

const keywordsMap = {
    'harina': ['111'], 'arroz': ['111'], 'carne': ['111'],
    'jeringa': ['194'], 'gasa': ['194'], 'guante': ['194'],
    'medicamento': ['152'], 'suero': ['194'],
    'limpieza': ['192'], 'jabon': ['192'],
    'papel': ['191'], 'resma': ['191'],
    'sueldo': ['011'], 'combustible': ['141'],
    'ambulancia': ['353'], 'reparacion': ['271'],
    'electricidad': ['213'], 'agua': ['212']
};

// ================= IA OPTIMIZADA =================
async function consultarInteligenciaArtificial(query) {
    const internetDiv = document.getElementById('internetResults');
    const apiKey = document.getElementById('apiKeyInput').value.trim();

    if (!apiKey) return;

    // 🔥 CACHE
    const cacheKey = "ia_cache_" + query.toLowerCase();
    const cache = localStorage.getItem(cacheKey);
    if (cache) {
        renderIA(JSON.parse(cache), query);
        return;
    }

    internetDiv.style.display = 'block';
    internetDiv.innerHTML = '<div class="loading">🤖 Analizando...</div>';

    const prompt = `Clasificá este gasto hospitalario en Uruguay: "${query}".
Devolver JSON:
{
 "explicacion": "...",
 "objeto_sugerido": "111"
}`;

    try {
        const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`,
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            }
        );

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error?.message || "Error API");
        }

        let aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!aiText) throw new Error("Respuesta vacía");

        aiText = aiText.replace(/```json|```/g, '').trim();
        const aiData = JSON.parse(aiText);

        // 💾 GUARDAR CACHE
        localStorage.setItem(cacheKey, JSON.stringify(aiData));

        renderIA(aiData, query);

    } catch (error) {
        internetDiv.innerHTML = `
        <div class="error">
            ⚠️ IA no disponible<br>
            ${error.message}
        </div>`;
    }
}

// Render IA
function renderIA(aiData, query) {
    const internetDiv = document.getElementById('internetResults');

    let html = `
        <h4 style="color:#ff6b00;">🤖 Sugerencia IA</h4>
        <p>${aiData.explicacion}</p>
    `;

    if (aiData.objeto_sugerido) {
        html += `
        <button class="ai-save-btn"
        onclick="guardarSugerenciaIA('${query}', '${aiData.objeto_sugerido}')">
        Guardar como regla (${aiData.objeto_sugerido})
        </button>`;
    }

    internetDiv.innerHTML = html;
}

// ================= CSV =================
document.getElementById('csvFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event) {
        const lineas = event.target.result.split('\n');
        datosCompletos = [];

        for (let i = 1; i < lineas.length; i++) {
            const cols = lineas[i].split(',');

            if (cols.length >= 4) {
                datosCompletos.push({
                    objeto: cols[0],
                    auxiliar: cols[1],
                    denominacion: cols[2],
                    descripcion: cols[3],
                    grupo: cols[0].charAt(0)
                });
            }
        }

        document.getElementById('searchContainer').style.display = 'block';
    };

    reader.readAsText(file, 'ISO-8859-1');
});

// ================= BÚSQUEDA =================
function normalizar(t) {
    return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function calcularRelevancia(query, item) {
    const q = normalizar(query);
    let score = 0;

    if (keywordsMap[q]?.includes(item.objeto)) score += 80;
    if (normalizar(item.denominacion).includes(q)) score += 40;
    if (normalizar(item.descripcion).includes(q)) score += 30;

    return score;
}

function buscar() {
    const query = document.getElementById('searchInput').value.trim();
    const resultsDiv = document.getElementById('results');

    if (!query) return;

    let resultados = datosCompletos
        .map(i => ({ ...i, score: calcularRelevancia(query, i) }))
        .filter(r => r.score > 10)
        .sort((a, b) => b.score - a.score)
        .slice(0, limiteResultados);

    // 🔥 IA SOLO SI ES NECESARIA
    if (resultados.length < 3 || resultados[0]?.score < 50) {
        consultarInteligenciaArtificial(query);
    }

    if (resultados.length === 0) {
        resultsDiv.innerHTML = `<div class="no-results">Sin resultados</div>`;
        return;
    }

    let html = '';
    resultados.forEach(r => {
        html += `
        <div class="result-card">
            <strong>${r.objeto}</strong> - ${r.denominacion}
            <div>${r.descripcion}</div>
            <small>Score: ${r.score}</small>
        </div>`;
    });

    resultsDiv.innerHTML = html;
}

// ================= GUARDAR REGLA =================
function guardarSugerenciaIA(keyword, objeto) {
    localStorage.setItem("regla_" + keyword, objeto);
    alert("Regla guardada");
}
</script>
