<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Hospital de Flores - Memoria Permanente</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #003ca5; --orange: #ff6b00; --green: #28a745; --bg: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); padding: 10px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        /* Cabecera */
        .header { border-bottom: 3px solid var(--blue); margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: var(--blue); font-size: 1.2em; }

        /* Cargador de Archivo (Se oculta si ya hay datos) */
        #uploadSection { background: #eef2f7; padding: 20px; border-radius: 10px; text-align: center; border: 2px dashed var(--blue); margin-bottom: 20px; }
        .btn-file { background: var(--blue); color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; display: inline-block; margin-top: 10px; }
        
        /* Panel IA */
        .ai-box { background: #f8f9fa; border: 2px solid var(--orange); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .api-input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 6px; margin-top: 8px; }

        /* Buscador */
        .search-area { display: none; background: var(--blue); padding: 15px; border-radius: 10px; gap: 10px; flex-direction: column; }
        @media (min-width: 600px) { .search-area { flex-direction: row; } }
        #q { flex: 1; padding: 12px; border-radius: 6px; border: none; font-size: 1em; outline: none; }
        #b { padding: 12px 25px; background: var(--orange); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        /* Resultados e IA */
        .ia-status-msg { display: none; background: #fff5f0; border: 1px solid var(--orange); padding: 15px; border-radius: 8px; margin-top: 15px; color: #d35400; font-size: 0.95em; }
        .card { border-left: 6px solid var(--blue); padding: 15px; background: white; margin-top: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 6px; }
        .card.ia-found { border-left-color: var(--orange); background: #fffaf5; }
        .code-badge { background: var(--blue); color: white; padding: 3px 10px; border-radius: 12px; font-weight: bold; font-size: 0.8em; }
        
        .loading { text-align: center; padding: 20px; font-weight: bold; color: var(--blue); }
        .reset-db { font-size: 0.7em; color: #999; cursor: pointer; text-decoration: underline; margin-top: 20px; display: block; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Hospital de Flores</h1>
            <div id="dbStatus" style="font-size: 0.7em; font-weight: bold;"></div>
        </div>

        <div id="uploadSection">
            <h3 style="color: var(--blue);">📂 Carga la base de datos (Solo una vez)</h3>
            <p style="font-size: 0.8em; color: #666; margin-top: 5px;">Selecciona el archivo ObjetosGasto.csv para guardarlo en la memoria del buscador.</p>
            <label class="btn-file">
                SELECCIONAR ARCHIVO
                <input type="file" id="csvFile" accept=".csv" style="display:none;">
            </label>
        </div>

        <div id="mainApp" style="display:none;">
            <div class="ai-box">
                <label style="font-weight:bold; color:var(--orange); font-size: 0.8em;">🔑 Clave API Google Gemini:</label>
                <input type="password" id="key" class="api-input" placeholder="Pega tu clave AIzaSy...">
            </div>

            <div class="search-area" id="searchArea" style="display: flex;">
                <input type="text" id="q" placeholder="Ej: Atún, Jeringas, 152, Reparación..." onkeypress="if(event.key==='Enter') buscar()">
                <button id="b" onclick="buscar()">ANALIZAR</button>
            </div>

            <div id="iaStatus" class="ia-status-msg"></div>
            <div id="results"></div>
            
            <span class="reset-db" onclick="resetDatabase()">⚠️ Cambiar o borrar base de datos actual</span>
        </div>
    </div>

    <script>
        let DB_LOCAL = [];
        let isWorking = false;

        window.onload = () => {
            document.getElementById('key').value = localStorage.getItem('h_key') || '';
            checkDatabase();
        };

        // --- GESTIÓN DE MEMORIA PERMANENTE ---
        function checkDatabase() {
            const savedData = localStorage.getItem('hospital_db');
            if (savedData) {
                DB_LOCAL = JSON.parse(savedData);
                document.getElementById('uploadSection').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('dbStatus').innerHTML = `✅ ${DB_LOCAL.length} OBJETOS CARGADOS`;
                document.getElementById('dbStatus').style.color = "var(--green)";
            }
