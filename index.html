<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Buscador Objetos del Gasto - CGN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .search-box input {
            flex: 1;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            border-color: #667eea;
        }
        .search-box button {            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .search-box button:hover {
            background: #5568d3;
        }
        .results {
            margin-top: 20px;
        }
        .result-card {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            transition: transform 0.2s;
        }
        .result-card:hover {
            transform: translateX(5px);
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .codigo {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .denominacion {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .descripcion {
            color: #666;
            line-height: 1.6;
            margin-top: 10px;
        }
        .relevancia {            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .stats {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Buscador Objetos del Gasto</h1>
        <p class="subtitle">Clasificador CGN - SIIF Uruguay</p>
        
        <div class="stats">
            📊 <strong id="totalRegistros">0</strong> registros disponibles
        </div>
        
        <div class="search-box">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Ej: harina, sueldo, combustible, vehículo..."
                onkeypress="if(event.key === 'Enter') buscar()"
            >
            <button onclick="buscar()">🔎 Buscar</button>
        </div>
        
        <div id="results" class="results"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api';
                // Cargar estadísticas al iniciar
        async function cargarStats() {
            try {
                const response = await fetch(`${API_URL}/buscar?q=a`);
                const data = await response.json();
                // Estimación basada en la respuesta
                document.getElementById('totalRegistros').textContent = '1000+';
            } catch (e) {
                console.log('Error cargando stats');
            }
        }
        
        async function buscar() {
            const query = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!query) {
                resultsDiv.innerHTML = '<div class="error">⚠️ Ingresa un término de búsqueda</div>';
                return;
            }
            
            resultsDiv.innerHTML = '<div class="loading">⏳ Buscando...</div>';
            
            try {
                const response = await fetch(`${API_URL}/buscar?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (data.resultados.length === 0) {
                    resultsDiv.innerHTML = '<div class="error">❌ No se encontraron resultados</div>';
                    return;
                }
                
                let html = `<div class="stats">✅ <strong>${data.total}</strong> resultados encontrados</div>`;
                
                data.resultados.forEach(r => {
                    html += `
                        <div class="result-card">
                            <div class="result-header">
                                <span class="codigo">${r.objeto}/${r.auxiliar}</span>
                                <span class="relevancia">Relevancia: ${r.relevancia}%</span>
                            </div>
                            <div class="denominacion">${r.denominacion}</div>
                            <div class="descripcion">${r.descripcion}</div>
                        </div>
                    `;
                });
                
                resultsDiv.innerHTML = html;
            } catch (error) {
                resultsDiv.innerHTML = `                    <div class="error">
                        ❌ Error de conexión: ${error.message}<br>
                        💡 Asegúrate de que el backend esté corriendo en puerto 8000
                    </div>
                `;
            }
        }
        
        // Inicializar
        cargarStats();
    </script>
</body>
</html>
