<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏥 Hospital de Flores - Cargador CSV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f5f7fa; 
            padding: 20px; 
            color: #333;
        }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #003ca5; margin-bottom: 20px; text-align: center; }
        
        .upload-box {
            border: 3px dashed #003ca5;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            margin: 20px 0;
            transition: all 0.3s;
            cursor: pointer;
        }
        .upload-box:hover, .upload-box.dragover {
            border-color: #002d7a;
            background: #eef2ff;
        }
        .upload-box input { display: none; }
        
        .btn {
            background: #003ca5;
            color: #fff;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 5px;
            transition: background 0.3s;
        }
        .btn:hover { background: #002d7a; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .status {
            padding: 15px;            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }
        .status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        .status.info { background: #cce5ff; color: #004085; border: 1px solid #b8daff; display: block; }
        
        .debug {
            background: #1e1e1e;
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin: 15px 0;
            display: none;
        }
        .debug.show { display: block; }
        
        .preview {
            margin: 20px 0;
            overflow-x: auto;
        }
        .preview table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .preview th, .preview td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .preview th { background: #003ca5; color: #fff; }
        .preview tr:nth-child(even) { background: #f9f9f9; }
        
        .search-section { display: none; margin-top: 30px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #003ca5;
            border-radius: 8px;
            font-size: 16px;
        }
        .results { display: grid; gap: 10px; }
        .result {            background: #f8f9ff;
            padding: 15px;
            border-left: 4px solid #003ca5;
            border-radius: 4px;
            cursor: pointer;
        }
        .result:hover { background: #eef2ff; }
        .result-code { font-weight: bold; color: #003ca5; }
        
        #toggleDebug { 
            background: none; border: 1px solid #666; color: #666; 
            padding: 5px 10px; font-size: 12px; border-radius: 4px; 
            cursor: pointer; float: right;
        }
        #toggleDebug:hover { background: #eee; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏥 Hospital de Flores - Cargador CSV</h1>
    
    <button id="toggleDebug" onclick="toggleDebug()">🐛 Ver consola</button>
    <div id="debug" class="debug"></div>
    
    <!-- Zona de carga -->
    <div class="upload-box" id="dropZone">
        <p style="font-size: 1.2em; margin-bottom: 15px;">📁 Arrastrá tu archivo CSV acá</p>
        <p style="color: #666; margin-bottom: 20px;">o</p>
        <label class="btn" for="csvFile">📂 Seleccionar archivo</label>
        <input type="file" id="csvFile" accept=".csv,text/csv">
        <p style="margin-top: 15px; font-size: 0.9em; color: #666;">
            ✅ Formato: UTF-8 • ✅ Encabezado requerido • ✅ Máx 10MB
        </p>
    </div>
    
    <!-- Estados -->
    <div id="status" class="status"></div>
    
    <!-- Vista previa -->
    <div id="preview" class="preview"></div>
    
    <!-- Buscador (aparece después de cargar) -->
    <div id="searchSection" class="search-section">
        <h3 style="color:#003ca5;margin-bottom:15px">🔍 Buscar objetos</h3>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Ej: harina, sueldo, 111...">
            <button class="btn" onclick="doSearch()">Buscar</button>
        </div>
        <div id="results" class="results"></div>
        <p id="resultCount" style="color:#666;font-size:0.9em"></p>    </div>
</div>

<script>
// Variables globales
let datos = [];
const debugEl = document.getElementById('debug');
const statusEl = document.getElementById('status');

// Logging para debug
function log(msg, type='info') {
    const time = new Date().toLocaleTimeString();
    const line = `[${time}] ${msg}`;
    console.log(line);
    debugEl.innerHTML += `<div>${line}</div>`;
    debugEl.scrollTop = debugEl.scrollHeight;
}

function toggleDebug() {
    debugEl.classList.toggle('show');
}

function showStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = `status ${type}`;
    log(msg, type);
}

// Manejo de archivos
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('csvFile');

// Drag & drop
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
    dropZone.addEventListener(evt, e => {
        e.preventDefault();
        e.stopPropagation();
    });
});

['dragenter', 'dragover'].forEach(evt => {
    dropZone.addEventListener(evt, () => dropZone.classList.add('dragover'));
});

['dragleave', 'drop'].forEach(evt => {
    dropZone.addEventListener(evt, () => dropZone.classList.remove('dragover'));
});

dropZone.addEventListener('drop', e => {
    const file = e.dataTransfer.files[0];    if (file) handleFile(file);
});

fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) handleFile(file);
});

// Procesar archivo
function handleFile(file) {
    log(`📄 Archivo seleccionado: ${file.name} (${formatSize(file.size)})`);
    
    // Validaciones
    if (!file.name.toLowerCase().endsWith('.csv')) {
        showStatus('❌ Solo se aceptan archivos .csv', 'error');
        return;
    }
    
    if (file.size > 10 * 1024 * 1024) {
        showStatus('❌ Archivo muy grande (máximo 10MB)', 'error');
        return;
    }
    
    showStatus('🔄 Leyendo archivo...', 'info');
    
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            log('✅ Archivo leído, procesando...');
            procesarCSV(e.target.result);
        } catch (err) {
            log(`❌ Error: ${err.message}`, 'error');
            showStatus(`❌ Error: ${err.message}`, 'error');
        }
    };
    
    reader.onerror = function() {
        log('❌ Error al leer el archivo', 'error');
        showStatus('❌ No se pudo leer el archivo. Verificá permisos.', 'error');
    };
    
    // Intentar con diferentes encodings
    reader.readAsText(file, 'UTF-8');
    
    // Fallback para archivos con BOM o encoding diferente
    setTimeout(() => {
        if (!datos.length && reader.readyState === 1) {
            log('⚠️ Intentando con encoding ISO-8859-1...');
            reader.abort();            const reader2 = new FileReader();
            reader2.onload = e => procesarCSV(e.target.result);
            reader2.readAsText(file, 'ISO-8859-1');
        }
    }, 2000);
}

// Parsear CSV robusto
function procesarCSV(texto) {
    log(`📊 Texto recibido: ${texto.length} caracteres`);
    
    // Detectar y remover BOM
    if (texto.charCodeAt(0) === 0xFEFF) {
        texto = texto.slice(1);
        log('🔧 BOM detectado y removido');
    }
    
    // Normalizar saltos de línea
    texto = texto.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    
    const lineas = texto.split('\n').filter(l => l.trim());
    log(`📋 Líneas encontradas: ${lineas.length}`);
    
    if (lineas.length < 2) {
        throw new Error('El CSV está vacío o no tiene datos');
    }
    
    // Parsear encabezado
    const encabezado = parseCSVLine(lineas[0]);
    log(`🏷️ Encabezado: [${encabezado.join(', ')}]`);
    
    // Parsear datos
    datos = [];
    let errores = 0;
    
    for (let i = 1; i < lineas.length; i++) {
        try {
            const campos = parseCSVLine(lineas[i]);
            if (campos.length >= 3 && campos[0]?.match(/^\d{3}$/)) {
                datos.push({
                    objeto: campos[0].trim(),
                    auxiliar: campos[1]?.trim() || '000',
                    denominacion: campos[2]?.trim() || '',
                    descripcion: campos[3]?.trim() || ''
                });
            }
        } catch (e) {
            errores++;
            log(`⚠️ Línea ${i+1} ignorada: ${lineas[i].slice(0,50)}...`);
        }    }
    
    log(`✅ Datos cargados: ${datos.length} registros, ${errores} errores`);
    
    if (datos.length === 0) {
        throw new Error('No se encontraron objetos válidos. Verificá el formato del CSV.');
    }
    
    // Mostrar éxito
    showStatus(`✅ ¡Listo! ${datos.length} objetos cargados`, 'success');
    
    // Mostrar vista previa
    mostrarPreview(encabezado, datos.slice(0, 5));
    
    // Activar buscador
    document.getElementById('searchSection').style.display = 'block';
    document.getElementById('resultCount').textContent = `${datos.length} objetos disponibles`;
    
    // Búsqueda inicial con ejemplo
    document.getElementById('searchInput').placeholder = `Ej: ${datos[Math.floor(Math.random()*datos.length)].denominacion.slice(0,20)}...`;
}

// Parsear una línea de CSV (maneja comillas y comas)
function parseCSVLine(linea) {
    const campos = [];
    let campo = '';
    let entreComillas = false;
    
    for (let i = 0; i < linea.length; i++) {
        const char = linea[i];
        const next = linea[i + 1];
        
        if (char === '"') {
            if (entreComillas && next === '"') {
                campo += '"';
                i++;
            } else {
                entreComillas = !entreComillas;
            }
        } else if (char === ',' && !entreComillas) {
            campos.push(campo.trim());
            campo = '';
        } else {
            campo += char;
        }
    }
    campos.push(campo.trim());
    
    return campos.map(c => c.replace(/^"|"$/g, ''));
}
// Mostrar vista previa
function mostrarPreview(encabezado, filas) {
    const container = document.getElementById('preview');
    let html = '<h4 style="margin:15px 0 10px;color:#003ca5">👀 Vista previa (primeras 5 filas):</h4>';
    html += '<table><thead><tr>';
    encabezado.slice(0, 4).forEach(h => html += `<th>${escapeHtml(h)}</th>`);
    html += '</tr></thead><tbody>';
    
    filas.forEach(fila => {
        html += '<tr>';
        for (let i = 0; i < Math.min(4, fila.length); i++) {
            html += `<td>${escapeHtml(fila[i] || '')}</td>`;
        }
        html += '</tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1024/1024).toFixed(1) + ' MB';
}

// Búsqueda
function doSearch() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const resultsDiv = document.getElementById('results');
    
    if (!query || query.length < 2) {
        resultsDiv.innerHTML = '<p style="color:#666">Ingresa al menos 2 caracteres para buscar</p>';
        return;
    }
    
    const resultados = datos.filter(d => 
        d.objeto.includes(query) || 
        d.auxiliar.includes(query) ||
        d.denominacion.toLowerCase().includes(query) ||
        d.descripcion.toLowerCase().includes(query)
    ).slice(0, 50);
    
    if (resultados.length === 0) {        resultsDiv.innerHTML = '<p style="color:#666">❌ No se encontraron resultados</p>';
        return;
    }
    
    resultsDiv.innerHTML = resultados.map(r => `
        <div class="result" onclick="copiar('${r.objeto}/${r.auxiliar}')">
            <div class="result-code">${r.objeto}/${r.auxiliar}</div>
            <div><strong>${escapeHtml(r.denominacion)}</strong></div>
            <div style="color:#666;font-size:0.9em">${escapeHtml(r.descripcion.slice(0,100))}${r.descripcion.length>100?'...':''}</div>
        </div>
    `).join('');
    
    document.getElementById('resultCount').textContent = `${resultados.length} resultados encontrados`;
    log(`🔍 Búsqueda "${query}": ${resultados.length} resultados`);
}

// Copiar al portapapeles
async function copiar(texto) {
    try {
        await navigator.clipboard.writeText(texto);
        showStatus(`📋 Copiado: ${texto}`, 'success');
    } catch {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = texto;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showStatus(`📋 Copiado: ${texto}`, 'success');
    }
}

// Búsqueda con Enter
document.getElementById('searchInput')?.addEventListener('keypress', e => {
    if (e.key === 'Enter') doSearch();
});

// Atajos de teclado
document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'k') {
        e.preventDefault();
        document.getElementById('searchInput')?.focus();
    }
});

log('🚀 Aplicación inicializada');
</script>
</body>
</html>
