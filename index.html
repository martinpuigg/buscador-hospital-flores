<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clasificador Inteligente - Hospital de Flores</title>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px; }
.container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; }

input, button { padding:10px; margin:5px; }
button { cursor:pointer; }

.result-card {
    border:1px solid #ddd;
    padding:10px;
    margin-top:10px;
    border-left:5px solid #003ca5;
}

.ai-box {
    background:#fff5f0;
    border:2px solid orange;
    padding:15px;
    margin-top:15px;
}
</style>
</head>

<body>
<div class="container">

<h2>🏥 Clasificador de Gastos</h2>

<input type="password" id="apiKey" placeholder="API Key Gemini">
<br>

<input type="file" id="csvFile">
<br><br>

<input type="text" id="searchInput" placeholder="Ej: jeringas, arroz...">
<button onclick="buscar()">Buscar</button>

<div id="results"></div>
<div id="ia"></div>

</div>

<script>

// ================= VARIABLES =================
let datos = [];
let cacheIA = {};

// ================= CSV =================
document.getElementById("csvFile").addEventListener("change", function(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(evt){
        const lines = evt.target.result.split("\n");

        for(let i=1;i<lines.length;i++){
            let cols = lines[i].split(",");
            if(cols.length >= 4){
                datos.push({
                    objeto: cols[0],
                    aux: cols[1],
                    den: cols[2],
                    desc: cols[3]
                });
            }
        }

        alert("CSV cargado: " + datos.length);
    };

    reader.readAsText(file, "ISO-8859-1");
});

// ================= NORMALIZAR =================
function norm(t){
    return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

// ================= SCORE =================
function score(q, item){
    let s = 0;
    if(norm(item.den).includes(q)) s += 40;
    if(norm(item.desc).includes(q)) s += 30;
    return s;
}

// ================= BUSCAR =================
function buscar(){
    const query = norm(document.getElementById("searchInput").value);
    const div = document.getElementById("results");
    const iaDiv = document.getElementById("ia");

    iaDiv.innerHTML = "";

    let res = datos.map(d => ({...d, s: score(query, d)}))
        .filter(r => r.s > 10)
        .sort((a,b)=>b.s-a.s)
        .slice(0,10);

    if(res.length){
        div.innerHTML = res.map(r=>`
            <div class="result-card">
                <b>${r.objeto}</b> - ${r.den}<br>
                <small>${r.desc}</small><br>
                Score: ${r.s}
            </div>
        `).join("");
    } else {
        div.innerHTML = "Sin resultados";
    }

    // 🔥 IA solo si no hay buena coincidencia
    if(res.length === 0 || res[0].s < 40){
        consultarIA(query);
    }
}

// ================= VALIDAR CSV =================
function validarObjeto(obj){
    return datos.find(d => d.objeto === obj);
}

// ================= IA =================
async function consultarIA(query){

    const apiKey = document.getElementById("apiKey").value;
    const div = document.getElementById("ia");

    if(!apiKey){
        div.innerHTML = "Sin API Key";
        return;
    }

    // 🔥 CACHE
    if(cacheIA[query]){
        renderIA(cacheIA[query], query);
        return;
    }

    div.innerHTML = "Analizando con IA...";

    const prompt = `
Clasificá este gasto hospitalario en Uruguay: "${query}"

Devolver JSON:
{
 "explicacion": "...",
 "objeto_sugerido": "111"
}
`;

    try{

        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`,
            {
                method:"POST",
                headers:{ "Content-Type":"application/json" },
                body: JSON.stringify({
                    contents:[{ parts:[{ text: prompt }] }]
                })
            }
        );

        const data = await res.json();

        if(!res.ok){
            throw new Error(data.error.message);
        }

        let text = data.candidates[0].content.parts[0].text;
        text = text.replace(/```json|```/g,"").trim();

        const json = JSON.parse(text);

        // VALIDAR
        const match = validarObjeto(json.objeto_sugerido);

        if(!match){
            div.innerHTML = "IA devolvió objeto inválido";
            return;
        }

        cacheIA[query] = {json, match};

        renderIA({json, match}, query);

    }catch(e){
        div.innerHTML = "Error IA: " + e.message;
    }
}

// ================= RENDER IA =================
function renderIA(data, query){

    const div = document.getElementById("ia");

    div.innerHTML = `
    <div class="ai-box">
        <b>🤖 IA sugiere:</b><br><br>

        ${data.json.explicacion}<br><br>

        <b>Objeto ${data.match.objeto}</b><br>
        ${data.match.den}<br>
        <small>${data.match.desc}</small><br><br>

        <button onclick="guardar('${query}','${data.match.objeto}')">
        Guardar regla
        </button>
    </div>
    `;
}

// ================= GUARDAR =================
function guardar(q,obj){
    localStorage.setItem("reg_"+q,obj);
    alert("Guardado");
}

</script>

</body>
</html>
