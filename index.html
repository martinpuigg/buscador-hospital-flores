<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clasificador Inteligente</title>

<style>
body { font-family: Arial; padding:20px; background:#f5f7fb; }
input { padding:10px; width:300px; }
button { padding:10px; }
.result { margin-top:20px; padding:15px; border-left:5px solid #003ca5; background:white; }
.sugerencias span {
    background:#003ca5; color:#fff; padding:5px 10px; margin:5px;
    display:inline-block; cursor:pointer; border-radius:5px;
}
</style>
</head>

<body>

<h2>🏥 Clasificador Inteligente</h2>

<input type="file" id="csvFile"><br><br>

<input type="text" id="searchInput" placeholder="Ej: carne, insumos..."
onkeypress="if(event.key==='Enter') buscar()">

<button onclick="buscar()">Buscar</button>

<div class="sugerencias" id="sugerencias"></div>
<div id="resultado"></div>

<script>

let datos = [];
let memoria = JSON.parse(localStorage.getItem('memoria') || '{}');

// ================= CSV =================
function parseCSVLine(line) {
    let result=[], current='', inQuotes=false;
    for (let char of line) {
        if (char === '"') inQuotes = !inQuotes;
        else if (char === ',' && !inQuotes) {
            result.push(current); current='';
        } else current += char;
    }
    result.push(current);
    return result;
}

document.getElementById('csvFile').addEventListener('change', function(e){
    const reader = new FileReader();
    reader.onload = function(e){
        const lines = e.target.result.split('\n');
        datos = [];

        for(let i=1;i<lines.length;i++){
            let c = parseCSVLine(lines[i]);
            if(c.length >= 4){
                datos.push({
                    objeto:c[0].trim(),
                    auxiliar:c[1].trim(),
                    denominacion:c[2].replace(/^"|"$/g,'').trim(),
                    descripcion:c[3].replace(/^"|"$/g,'').trim()
                });
            }
        }

        alert("CSV cargado");
    };
    reader.readAsText(e.target.files[0]);
});

// ================= NORMALIZAR =================
function norm(t){
    return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

// ================= REGLA ALIMENTOS =================
const alimentos = ['carne','arroz','harina','pan','leche','queso','pollo','pescado'];

// ================= DEFINICIÓN =================
function definicion(item){
    return `Objeto ${item.objeto}: ${item.denominacion}`;
}

// ================= BUSCAR =================
function buscar(){

    const q = norm(document.getElementById('searchInput').value);
    const div = document.getElementById('resultado');

    if(!q){ div.innerHTML="Escribí algo"; return; }

    let resultado;

    // 🔥 1. MEMORIA (PRIORIDAD MÁXIMA)
    if(memoria[q]){
        resultado = datos.find(d =>
            d.objeto === memoria[q].objeto &&
            d.auxiliar === memoria[q].auxiliar
        );
    }

    // 🔥 2. REGLA ALIMENTOS
    if(!resultado && alimentos.some(a=>q.includes(a))){
        resultado = datos.find(d => d.objeto === '111');
    }

    // 🔥 3. BÚSQUEDA NORMAL
    if(!resultado){
        resultado = datos.find(d =>
            norm(d.denominacion + d.descripcion).includes(q)
        );
    }

    if(!resultado){
        div.innerHTML="No encontrado";
        return;
    }

    // 🔥 GUARDAR APRENDIZAJE
    memoria[q] = {
        objeto: resultado.objeto,
        auxiliar: resultado.auxiliar
    };
    localStorage.setItem('memoria', JSON.stringify(memoria));

    div.innerHTML = `
        <div class="result">
            <b>${resultado.objeto}/${resultado.auxiliar}</b><br><br>
            <b>${resultado
