<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador del Buscador Permanente</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 500px; }
        h2 { color: #003ca5; margin-bottom: 20px; }
        .btn { background: #003ca5; color: white; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-block; transition: 0.3s; }
        .btn:hover { background: #002d7a; transform: translateY(-2px); }
        input { display: none; }
        #status { margin-top: 20px; color: #28a745; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🛠️ Paso Final</h2>
        <p>Carga el archivo <b>ObjetosGasto (3).csv</b> para crear el buscador permanente con los 1.886 objetos inyectados.</p>
        <label class="btn">
            📥 SELECCIONAR CSV
            <input type="file" id="csvIn" accept=".csv">
        </label>
        <div id="status">✅ ¡Hecho! Revisa tus descargas.</div>
    </div>

    <script>
        document.getElementById('csvIn').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const lines = event.target.result.split(/\r?\n/);
                const data = [];
                for (let i = 1; i < lines.length; i++) {
                    const col = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (col.length >= 3) {
                        data.push({
                            o: col[0].replace(/"/g, '').trim(),
                            a: col[1].replace(/"/g, '').trim() || "000",
                            n: col[2].replace(/"/g, '').trim(),
                            d: (col[3] || "").replace(/"/g, '').trim()
                        });
                    }
                }
                generar(data);
            };
            reader.readAsText(file, 'ISO-8859-1');
        });

        function generar(json) {
            const dataStr = JSON.stringify(json);
            const html = `<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador Hospital de Flores - OFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { border-bottom: 3px solid #003ca5; margin-bottom: 25px; padding-bottom: 10px; }
        .ai-box { background: #f8f9fa; border: 2px solid #003ca5; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .api-input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 5px; margin-top: 10px; font-family: inherit; }
        .search-section { background: #003ca5; padding: 20px; border-radius: 10px; display: flex; gap: 10px; }
        #q { flex: 1; padding: 15px; border-radius: 5px; border: none; font-size: 1.1em; }
        #b { padding: 15px 30px; background: #ff6b00; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #b:disabled { background: #ccc; }
        .ia-res { display: none; background: #fff5f0; border: 2px solid #ff6b00; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .card { border-left: 5px solid #003ca5; padding: 20px; background: white; margin-top: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-radius: 5px; }
        .code { background: #003ca5; color: white; padding: 5px 12px; border-radius: 15px; font-weight: bold; font-size: 0.9em; }
        .loading { color: #003ca5; font-weight: bold; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="color:#003ca5; margin:0;">🏥 Hospital de Flores</h1>
            <p style="margin:5px 0; color:#666;">Buscador de Objetos del Gasto - Base de Datos Integrada</p>
        </div>

        <div class="ai-box">
            <label style="font-weight:bold; color:#ff6b00;">🤖 Activar Inteligencia Artificial (Gemini API Key):</label>
            <input type="password" id="key" class="api-input" placeholder="Pega aquí tu clave AIzaSy...">
        </div>

        <div class="search-section">
            <input type="text" id="q" placeholder="¿Qué quieres clasificar? (ej: atun, jeringas, reparacion)">
            <button id="b" onclick="buscar()">ANALIZAR</button>
        </div>

        <div id="ia" class="ia-res"></div>
        <div id="res"></div>
    </div>

    <script>
        const DB = ${dataStr};
        let cache = JSON.parse(localStorage.getItem('hosp_cache') || '{}');
        let busy = false;

        window.onload = () => { document.getElementById('key').value = localStorage.getItem('hosp_key') || ''; };
        document.getElementById('key').onchange = (e) => localStorage.setItem('hosp_key', e.target.value);

        async function buscar() {
            if (busy) return;
            const query = document.getElementById('q').value.trim();
            if (query.length < 2) return;

            busy = true;
            document.getElementById('b').innerText = "⏳...";
            document.getElementById('b').disabled = true;

            const resDiv = document.getElementById('res');
            resDiv.innerHTML = '<div class="loading">Buscando en los 1.886 registros...</div>';

            // Búsqueda Local
            const filtered = DB.filter(i => i.n.toLowerCase().includes(query.toLowerCase()) || i.o.includes(query));
            
            // IA
            consultarIA(query);

            setTimeout(() => {
                resDiv.innerHTML = filtered.length ? '' : '<p style="text-align:center; padding:20px;">No hay coincidencia exacta. Revisa la IA arriba.</p>';
                filtered.slice(0, 50).forEach(r => {
                    resDiv.innerHTML += \`<div class="card">
                        <span class="code">\${r.o} / \${r.a}</span>
                        <h3 style="margin:10px 0 5px 0; color:#003ca5;">\${r.n}</h3>
                        <p style="margin:0; color:#666; font-size:0.9em;">\${r.d}</p>
                    </div>\`;
                });
                busy = false;
                document.getElementById('b').innerText = "ANALIZAR";
                document.getElementById('b').disabled = false;
            }, 300);
        }

        async function consultarIA(query) {
            const iaDiv = document.getElementById('ia');
            const key = document.getElementById('key').value.trim();
            if (!key) return;

            if (cache[query.toLowerCase()]) {
                iaDiv.style.display = 'block';
                iaDiv.innerHTML = \`<h4 style="color:#ff6b00; margin:0 0 10px 0;">🤖 Memoria de IA:</h4><p style="margin:0;">\${cache[query.toLowerCase()]}</p>\`;
                return;
            }

            iaDiv.style.display = 'block';
            iaDiv.innerHTML = '🤖 La IA está pensando...';

            try {
                const p = "Eres experto contable de Uruguay. Clasifica este gasto del Hospital: " + query + ". Responde brevemente sugiriendo el objeto CGN.";
                const r = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + key, {
                    method: "POST",
                    body: JSON.stringify({ contents: [{ parts: [{ text: p }] }] })
                });
                const d = await r.json();
                const txt = d.candidates[0].content.parts[0].text;
                cache[query.toLowerCase()] = txt;
                localStorage.setItem('hosp_cache', JSON.stringify(cache));
                iaDiv.innerHTML = \`<h4 style="color:#ff6b00; margin:0 0 10px 0;">🤖 Recomendación IA:</h4><p style="margin:0;">\${txt}</p>\`;
            } catch (e) {
                iaDiv.innerHTML = "Límite de velocidad alcanzado. Espera 1 minuto.";
            }
        }
    <\/script>
</body>
</html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'Buscador_HOSPITAL_FINAL.html';
            a.click();
            document.getElementById('status').style.display = 'block';
        }
    </script>
</body>
</html>
