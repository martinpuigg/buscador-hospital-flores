<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador CGN</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <!-- Navegación Original -->
    <nav class="bg-[#1e3ba6] text-white shadow-lg sticky top-0 z-50 py-4 px-6">
        <div class="max-w-3xl mx-auto flex items-center gap-4">
            <div>
                <h1 class="text-xl md:text-2xl font-extrabold uppercase tracking-tight">Hospital de Flores</h1>
                <p class="text-xs text-blue-200 uppercase tracking-widest mt-1">Buscador de Compras CGN</p>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-3xl mx-auto w-full px-4 py-8 flex flex-col gap-6">
        
        <!-- Buscador -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <input type="text" id="searchInput" placeholder="Buscar insumo (ej. Legumbre, 111...)" 
                   class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-[#1e3ba6] transition-colors text-lg font-medium placeholder-slate-400">
            <div class="mt-3 text-sm text-slate-500 font-semibold" id="resultsLabel">Cargando base de datos...</div>
        </div>

        <div class="flex gap-4">
            <button id="uploadBtn" class="flex-1 py-3 px-4 bg-slate-200 text-slate-700 hover:bg-slate-300 rounded-xl font-bold text-sm uppercase tracking-wide transition-colors">
                📂 Cargar Padrón CSV
            </button>
            <input type="file" id="csvFileInput" class="hidden" accept=".csv">
            <button id="restoreBtn" class="hidden flex-1 py-3 px-4 bg-red-100 text-red-700 hover:bg-red-200 rounded-xl font-bold text-sm uppercase tracking-wide transition-colors">
                Restaurar Original
            </button>
        </div>
        
        <!-- Contenedor de Resultados (Aquí va tu diseño) -->
        <div id="resultsList" class="space-y-6 pb-12"></div>
        
    </main>

    <script>
        // ======================================================================
        // ¡ATENCIÓN! DEBES PONER UNA LLAVE NUEVA AQUÍ. 
        // La anterior (AIzaSyDM...) fue bloqueada por Google al filtrarse en Github.
        const GEMINI_API_KEY = "PEGA_AQUI_TU_NUEVA_LLAVE";
        // ======================================================================

        document.addEventListener('DOMContentLoaded', () => {

            const DATOS_POR_DEFECTO = [
                { objeto: "111", auxiliar: "000", denominacion: "Alimentos para personas", descripcion: "Todo insumo/producto para la preparación de comidas. Comprende los gastos en concepto de productos alimenticios, víveres, carnes, lácteos, azúcar, aceite." },
                { objeto: "131", auxiliar: "000", denominacion: "Útiles de escritorio, oficina y enseñanza", descripcion: "Comprende los gastos de papel, artículos de escritorio, útiles de oficina, bolígrafos, resmas, carpetas." },
                { objeto: "141", auxiliar: "000", denominacion: "Artículos de caucho y plástico", descripcion: "Comprende productos manufacturados de caucho y plástico como caños PVC, accesorios, polietileno." },
                { objeto: "151", auxiliar: "000", denominacion: "Productos de limpieza", descripcion: "Comprende productos para la higiene y limpieza del establecimiento: lavandina, escobas, jabón, detergente." },
                { objeto: "156", auxiliar: "000", denominacion: "Artículos y accesorios para sanitaria", descripcion: "Comprende los elementos destinados a instalaciones sanitarias y plomería: codos, válvulas, grifería, teflón." },
                { objeto: "181", auxiliar: "000", denominacion: "Medicamentos y productos farmacéuticos", descripcion: "Comprende los gastos en medicamentos e insumos médicos, farmacia, gasas, jeringas." },
                { objeto: "142", auxiliar: "000", denominacion: "Materiales eléctricos", descripcion: "Comprende lámparas, cables, tomacorrientes y afines." },
                { objeto: "149", auxiliar: "000", denominacion: "Herramientas menores", descripcion: "Comprende herramientas manuales, repuestos y ferretería." }
            ];

            let datosActuales = [...DATOS_POR_DEFECTO];
            let timeoutId = null;

            const searchInput = document.getElementById('searchInput');
            const resultsList = document.getElementById('resultsList');
            const resultsLabel = document.getElementById('resultsLabel');

            const normalizar = (text) => text ? text.toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";

            // --- Lógica de Carga CSV ---
            document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('csvFileInput').click());
            document.getElementById('csvFileInput').addEventListener('change', function(e) {
                Papa.parse(e.target.files[0], {
                    header: true, skipEmptyLines: true, encoding: "ISO-8859-1",
                    complete: function(results) {
                        const cleanField = (f) => f ? normalizar(f).replace(/[^a-z0-9]/g, '') : "";
                        const fields = results.meta.fields;
                        const keyObjeto = fields.find(f => cleanField(f).includes('objeto')) || fields[0];
                        const keyAux = fields.find(f => cleanField(f).includes('auxiliar') || cleanField(f).includes('subgrupo')) || fields[1];
                        const keyDenom = fields.find(f => cleanField(f).includes('denominacion') || cleanField(f).includes('nombre')) || fields[2];
                        const keyDesc = fields.find(f => cleanField(f).includes('desc')) || fields[3];

                        datosActuales = results.data.map((row, id) => ({
                            id, objeto: row[keyObjeto] ? row[keyObjeto].trim() : "",
                            auxiliar: row[keyAux] ? row[keyAux].trim() : "",
                            denominacion: row[keyDenom] ? row[keyDenom].trim() : "",
                            descripcion: row[keyDesc] ? row[keyDesc].trim() : ""
                        }));
                        
                        document.getElementById('uploadBtn').classList.add('hidden');
                        document.getElementById('restoreBtn').classList.remove('hidden');
                        ejecutarBusqueda();
                    }
                });
            });

            document.getElementById('restoreBtn').addEventListener('click', () => {
                datosActuales = [...DATOS_POR_DEFECTO];
                document.getElementById('csvFileInput').value = '';
                document.getElementById('uploadBtn').classList.remove('hidden');
                document.getElementById('restoreBtn').classList.add('hidden');
                ejecutarBusqueda();
            });

            // --- TU DISEÑO EXACTO RECONSTRUIDO (Basado en la captura de pantalla) ---
            function mostrarTarjetas(explicacionIA, listaObjetos) {
                resultsList.innerHTML = '';
                
                // 1. Tarjeta superior de la IA (Borde azul) - ¡Botón naranja eliminado!
                if (explicacionIA) {
                    resultsList.innerHTML += `
                        <div class="bg-white border-2 border-[#1e3ba6] rounded-xl p-6 shadow-sm mb-6">
                            <p class="text-slate-700 text-lg md:text-xl font-medium leading-relaxed">${explicacionIA}</p>
                        </div>
                    `;
                }

                if (listaObjetos.length === 0) {
                    resultsList.innerHTML += `<div class="bg-white p-6 text-center text-slate-500 rounded-xl border border-slate-200">No hay registros para mostrar.</div>`;
                    return;
                }

                // 2. Tarjeta inferior (Borde naranja, pastilla azul)
                listaObjetos.forEach(item => {
                    resultsList.innerHTML += `
                        <div class="bg-[#fff9f2] border-l-[6px] border-[#f97316] p-6 rounded-xl shadow-sm mb-4">
                            <div class="flex justify-between items-center mb-4">
                                <div class="bg-[#1e3ba6] text-white font-bold px-4 py-1.5 rounded-full text-sm tracking-wide">
                                    Objeto ${item.objeto} / ${item.auxiliar}
                                </div>
                                <div class="text-[#1e3ba6] font-bold text-sm tracking-wide">
                                    Relevancia: 80%
                                </div>
                            </div>
                            <h3 class="font-bold text-xl md:text-2xl text-slate-800 mb-2">${item.denominacion || 'SIN DENOMINACIÓN'}</h3>
                            <p class="text-slate-600 font-medium leading-relaxed">${item.descripcion}</p>
                        </div>`;
                });
            }

            // --- Motor de Búsqueda Seguro ---
            async function ejecutarBusqueda() {
                const term = normalizar(searchInput.value);
                
                // Validar que la llave se haya cambiado
                if (GEMINI_API_KEY === "PEGA_AQUI_TU_NUEVA_LLAVE" || GEMINI_API_KEY.includes("AIzaSyDM")) {
                    resultsList.innerHTML = `<div class="bg-red-50 border-l-4 border-red-500 p-6 text-red-700 rounded-xl shadow-sm"><h3 class="font-bold text-lg mb-2">⚠️ Error de Seguridad</h3><p>Google bloqueó tu antigua API Key porque se hizo pública. Por favor, genera una nueva llave en Google AI Studio y pégala en el código.</p></div>`;
                    return;
                }

                if (!term) {
                    resultsLabel.textContent = `Mostrando registros del padrón...`;
                    mostrarTarjetas(null, datosActuales.slice(0, 50));
                    return;
                }

                // A. Busca localmente primero
                const searchWords = term.split(/\s+/).filter(w => w.length > 0);
                const scoredItems = datosActuales.map(item => {
                    let score = 0;
                    const denom = normalizar(item.denominacion);
                    const desc = normalizar(item.descripcion);
                    const obj = normalizar(item.objeto);
                    
                    searchWords.forEach(word => {
                        if (denom.includes(word) || desc.includes(word) || obj.includes(word)) score += 10;
                        if (obj === word || obj.startsWith(word)) score += 50; 
                    });
                    return { item, score };
                });

                let resultadosLocales = scoredItems.filter(x => x.score > 0).sort((a, b) => b.score - a.score).map(x => x.item);

                if (resultadosLocales.length > 0 && resultadosLocales[0].denominacion.toLowerCase().includes(term)) {
                    resultsLabel.textContent = `Búsqueda local (CGN)`;
                    mostrarTarjetas(null, resultadosLocales.slice(0, 50));
                    return;
                }

                // B. Si no lo encuentra local, usa la Inteligencia Artificial
                resultsList.innerHTML = `<div class="bg-blue-50 p-6 text-center text-[#1e3ba6] font-bold rounded-xl border border-blue-200 animate-pulse text-lg">Conectando con la IA...</div>`;
                resultsLabel.textContent = "Analizando el insumo...";

                // Prompt súper simple y seguro que no rompe el código
                const prompt = `Actúa como asesor de compras del Estado.
Insumo: "${term}".
Escribe una breve oración explicando qué es o para qué sirve este insumo.
Al final de la oración, escribe ÚNICAMENTE el código de 3 dígitos de esta lista al que pertenece: 111 (Alimentos), 131 (Oficina), 141 (Plásticos), 151 (Limpieza), 156 (Sanitaria), 181 (Farmacia), 142 (Eléctrico), 149 (Herramientas).`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });

                    if (!response.ok) throw new Error("Llave API inválida o bloqueada.");

                    const data = await response.json();
                    let textoRespuesta = data.candidates[0].content.parts[0].text.trim();
                    
                    // Extrae el número sin equivocarse (ej: busca "111", "131", etc.)
                    const numeros = textoRespuesta.match(/\b(111|131|141|151|156|181|142|149)\b/);
                    const codigo = numeros ? numeros[0] : "000";
                    
                    // Borramos el número del texto para que la descripción quede limpia
                    let explicacionLimpia = textoRespuesta;
                    if (codigo !== "000") {
                        explicacionLimpia = explicacionLimpia.replace(codigo, '').trim();
                        // Limpiamos la puntuación que pueda quedar suelta al final
                        explicacionLimpia = explicacionLimpia.replace(/[:\-.,]+$/, '') + ".";
                    }
                    
                    if (codigo !== "000") {
                        const resultadosOficiales = datosActuales.filter(item => item.objeto.startsWith(codigo));
                        resultsLabel.textContent = `Asociado por IA`;
                        mostrarTarjetas(explicacionLimpia, resultadosOficiales.slice(0, 10));
                    } else {
                        resultsList.innerHTML = `<div class="bg-white p-6 text-center text-slate-500 rounded-xl border border-slate-200">El artículo no se relaciona con las categorías actuales.</div>`;
                    }
                } catch (error) {
                    console.error("Error IA:", error);
                    resultsList.innerHTML = `<div class="bg-red-50 text-red-600 p-6 text-center rounded-xl border border-red-200"><strong>Error de conexión.</strong> Verifica que la llave API sea nueva y esté activa.</div>`;
                }
            }

            searchInput.addEventListener('input', () => {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(ejecutarBusqueda, 1000); 
            });

            mostrarTarjetas(null, datosActuales.slice(0, 50));
        });
    </script>
</body>
</html>
