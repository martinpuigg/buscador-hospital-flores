<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Buscador IA - Objetos del Gasto CGN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Header */
        .header { text-align: center; padding: 40px 0; }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #aaa; font-size: 1.1em; }
        
        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .stat-item {
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            min-width: 150px;
        }
        .stat-number { font-size: 2em; font-weight: bold; color: #00ff88; }
        .stat-label { font-size: 0.9em; color: #aaa; }
        
        /* Search Container */
        .search-container {
            background: rgba(255,255,255,0.1);
            padding: 30px;            border-radius: 15px;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 18px 25px;
            font-size: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            outline: none;
            transition: all 0.3s;
        }
        .search-box input:focus {
            border-color: #00ff88;
            background: rgba(255,255,255,0.15);
        }
        .search-box input::placeholder { color: #888; }
        .search-box button {
            padding: 18px 40px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .search-box button:hover { transform: scale(1.05); }
        
        /* Filters */
        .filters { display: flex; gap: 15px; flex-wrap: wrap; }
        .filter-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #00ff88;            color: #000;
        }
        
        /* Suggestions */
        .sugerencias {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .sugerencias h3 { margin-bottom: 15px; color: #00d9ff; }
        .sugerencias-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }
        .sugerencia-item {
            background: rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .sugerencia-item:hover { background: #00ff88; color: #000; }
        
        /* Results */
        .results-container { display: grid; gap: 20px; }
        .result-card {
            background: rgba(255,255,255,0.08);
            border-left: 4px solid #00ff88;
            padding: 25px;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .result-card:hover {
            transform: translateX(10px);
            background: rgba(255,255,255,0.12);
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .codigo-badge {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #000;            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1em;
        }
        .relevancia-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.9em;
        }
        .denominacion {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 10px;
            color: #00ff88;
        }
        .descripcion {
            color: #ccc;
            line-height: 1.6;
            font-size: 0.95em;
        }
        .categoria-tag {
            display: inline-block;
            background: rgba(0,217,255,0.2);
            color: #00d9ff;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            margin-top: 10px;
        }
        .fuente-tag {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            color: #fff;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.75em;
            margin-left: 10px;
        }
        
        /* Loading & Error */
        .loading { text-align: center; padding: 50px; font-size: 1.5em; color: #888; }
        .error {
            background: rgba(255,100,100,0.2);
            border: 1px solid #ff6464;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }        .no-results { text-align: center; padding: 50px; color: #888; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .search-box { flex-direction: column; }
            .stats-bar { flex-direction: column; align-items: center; }
            .header h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Buscador IA - Objetos del Gasto</h1>
            <p>Clasificador CGN - SIIF Uruguay | Búsqueda Inteligente en +<span id="totalRegistrosHeader">0</span> registros</p>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="totalRegistros">0</div>
                <div class="stat-label">Registros Totales</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalObjetos">0</div>
                <div class="stat-label">Objetos Únicos</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="ultimaBusqueda">0</div>
                <div class="stat-label">Resultados</div>
            </div>
        </div>
        
        <div class="search-container">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Ej: harina, sueldo, combustible, vehículo, medicamento, construcción, internación, regla, útiles..."
                    onkeypress="if(event.key === 'Enter') buscar()"
                >
                <button onclick="buscar()">🔎 Buscar</button>
            </div>
            
            <div class="filters">
                <button class="filter-btn active" onclick="setLimite(20)">20 resultados</button>
                <button class="filter-btn" onclick="setLimite(50)">50 resultados</button>
                <button class="filter-btn" onclick="setLimite(100)">100 resultados</button>
            </div>
            
            <div class="sugerencias" id="sugerencias">                <h3>💡 Búsquedas sugeridas</h3>
                <div class="sugerencias-grid" id="sugerenciasGrid"></div>
            </div>
        </div>
        
        <div id="results" class="results-container"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api';
        let limiteResultados = 20;
        
        // Cargar estadísticas
        async function cargarEstadisticas() {
            try {
                const response = await fetch(`${API_URL}/estadisticas`);
                const data = await response.json();
                document.getElementById('totalRegistros').textContent = data.total_registros;
                document.getElementById('totalRegistrosHeader').textContent = data.total_registros;
                document.getElementById('totalObjetos').textContent = data.total_objetos;
                
                // Mostrar sugerencias
                cargarSugerencias();
            } catch (e) {
                console.log('Error cargando stats');
            }
        }
        
        // Cargar sugerencias
        async function cargarSugerencias() {
            try {
                const response = await fetch(`${API_URL}/sugerencias`);
                const data = await response.json();
                const grid = document.getElementById('sugerenciasGrid');
                grid.innerHTML = data.sugerencias.map(s => 
                    `<div class="sugerencia-item" onclick="buscarCon('${s}')">${s}</div>`
                ).join('');
            } catch (e) {
                console.log('Error cargando sugerencias');
            }
        }
        
        function setLimite(limite) {
            limiteResultados = limite;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.textContent.includes(limite)) btn.classList.add('active');
            });
        }
                function buscarCon(termino) {
            document.getElementById('searchInput').value = termino;
            buscar();
        }
        
        async function buscar() {
            const query = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!query) {
                resultsDiv.innerHTML = '<div class="error">⚠️ Ingresa un término de búsqueda (mínimo 2 caracteres)</div>';
                return;
            }
            
            resultsDiv.innerHTML = '<div class="loading">⏳ Buscando en ' + document.getElementById('totalRegistros').textContent + ' registros...</div>';
            
            try {
                const response = await fetch(`${API_URL}/buscar?q=${encodeURIComponent(query)}&limite=${limiteResultados}`);
                const data = await response.json();
                
                document.getElementById('ultimaBusqueda').textContent = data.total_encontrados;
                
                if (data.resultados.length === 0) {
                    resultsDiv.innerHTML = `
                        <div class="no-results">
                            <h2>❌ No se encontraron resultados</h2>
                            <p>Intenta con otros términos o verifica la ortografía</p>
                            <p style="margin-top: 20px; color: #00d9ff;">💡 Prueba con: harina, sueldo, combustible, medicamento, vehículo, construcción, internación, regla, útiles</p>
                        </div>
                    `;
                    return;
                }
                
                let html = `<div style="margin-bottom: 20px; color: #00ff88;">
                    ✅ <strong>${data.total_encontrados}</strong> resultados encontrados 
                    (de ${data.total_registros} registros) | Búsqueda: ${data.tipo_busqueda}
                </div>`;
                
                data.resultados.forEach(r => {
                    html += `
                        <div class="result-card">
                            <div class="result-header">
                                <span class="codigo-badge">${r.objeto}/${r.auxiliar}</span>
                                <span class="relevancia-badge">📊 Relevancia: ${r.relevancia}%</span>
                            </div>
                            <div class="denominacion">${r.denominacion}</div>
                            <div class="descripcion">${r.descripcion}</div>
                            ${r.categoria ? `<div class="categoria-tag">📁 ${r.categoria}</div>` : ''}
                            ${r.fuente ? `<span class="fuente-tag">🔍 ${r.fuente}</span>` : ''}
                            ${r.keyword_encontrada ? `<span class="fuente-tag">🏷️ Keyword: ${r.keyword_encontrada}</span>` : ''}                        </div>
                    `;
                });
                
                resultsDiv.innerHTML = html;
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="error">
                        ❌ Error de conexión: ${error.message}<br>
                        💡 Asegúrate de que el backend esté corriendo en puerto 8000<br>
                        📖 Ejecuta: python main.py en la carpeta backend/
                    </div>
                `;
            }
        }
        
        // Inicializar
        cargarEstadisticas();
    </script>
</body>
</html>
