<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contaduría - Hospital de Flores</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <nav class="bg-[#003ca5] text-white shadow-lg sticky top-0 z-50 py-5 px-6">
        <h1 class="text-xl md:text-2xl font-bold uppercase">Hospital de Flores "Edison Camacho"</h1>
        <p class="text-sm text-blue-200 uppercase tracking-widest mt-1">Sector Contaduría • Buscador IA</p>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8 flex flex-col md:flex-row gap-8">
        
        <div class="flex-1 flex flex-col gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <label class="block text-sm font-semibold text-slate-600 mb-2 uppercase">Búsqueda Inteligente (Soporta IA)</label>
                <input type="text" id="searchInput" placeholder="Ej. Atún, Rúcula, Bisturí, 011..." 
                       class="w-full pl-4 pr-4 py-3 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600">
                <div class="mt-3 text-xs text-slate-500 font-bold" id="resultsLabel">Cargando base de datos...</div>
            </div>
            <div id="resultsList" class="space-y-4 pb-8"></div>
        </div>

        <div class="w-full md:w-80 flex-shrink-0">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 sticky top-28">
                <h3 id="dbTitle" class="font-bold text-slate-800 mb-2">🗄️ Base de Datos</h3>
                <p id="dbDesc" class="text-sm text-slate-500 mb-6">El sistema usa Inteligencia Artificial para buscar conceptos no registrados.</p>
                <button id="uploadBtn" class="w-full py-3 px-4 bg-[#003ca5] text-white rounded-lg font-semibold mb-3">Cargar Padrón CSV</button>
                <input type="file" id="csvFileInput" class="hidden" accept=".csv">
                <button id="restoreBtn" class="hidden w-full py-3 px-4 bg-slate-100 text-slate-700 rounded-lg font-semibold">Restaurar Original</button>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let datosActuales = [];
            let timeoutId = null;

            const searchInput = document.getElementById('searchInput');
            const resultsList = document.getElementById('resultsList');
            const resultsLabel = document.getElementById('resultsLabel');

            const normalizar = (text) => text ? text.toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";

            document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('csvFileInput').click());
            
            document.getElementById('csvFileInput').addEventListener('change', function(e) {
                Papa.parse(e.target.files[0], {
                    header: true, skipEmptyLines: true, encoding: "ISO-8859-1",
                    complete: function(results) {
                        const cleanField = (f) => f ? normalizar(f).replace(/[^a-z0-9]/g, '') : "";
                        const fields = results.meta.fields;
                        const keyObjeto = fields.find(f => cleanField(f).includes('objeto')) || fields[0];
                        const keyAux = fields.find(f => cleanField(f).includes('auxiliar') || cleanField(f).includes('subgrupo')) || fields[1];
                        const keyDenom = fields.find(f => cleanField(f).includes('denominacion') || cleanField(f).includes('nombre')) || fields[2];
                        const keyDesc = fields.find(f => cleanField(f).includes('desc')) || fields[3];

                        datosActuales = results.data.map((row, id) => ({
                            id, objeto: row[keyObjeto] ? row[keyObjeto].trim() : "",
                            auxiliar: row[keyAux] ? row[keyAux].trim() : "",
                            denominacion: row[keyDenom] ? row[keyDenom].trim() : "",
                            descripcion: row[keyDesc] ? row[keyDesc].trim() : ""
                        }));
                        
                        document.getElementById('uploadBtn').classList.add('hidden');
                        document.getElementById('restoreBtn').classList.remove('hidden');
                        resultsLabel.textContent = `Padrón cargado. Puede buscar.`;
                    }
                });
            });

            // Función de renderizado gráfico
            function mostrarResultados(lista, mensaje) {
                resultsList.innerHTML = '';
                resultsLabel.textContent = mensaje;
                if(lista.length === 0) {
                    resultsList.innerHTML = `<div class="bg-white p-8 text-center text-slate-500 rounded-xl border">No se encontraron clasificaciones.</div>`;
                    return;
                }
                lista.forEach(item => {
                    resultsList.innerHTML += `
                        <div class="bg-white p-5 rounded-xl shadow-sm border hover:border-blue-600 transition-colors">
                            <div class="flex justify-between items-start gap-4 mb-3">
                                <h3 class="font-bold text-lg text-slate-800 uppercase flex-1">${item.denominacion || 'N/A'}</h3>
                                <div class="flex gap-2">
                                    <div class="bg-[#003ca5] text-white px-3 py-1 rounded text-sm"><span class="block text-[10px]">OBJETO</span>${item.objeto}</div>
                                    <div class="bg-slate-100 px-3 py-1 rounded text-sm text-slate-700"><span class="block text-[10px]">AUX</span>${item.auxiliar}</div>
                                </div>
                            </div>
                            <p class="text-sm text-slate-600">${item.descripcion}</p>
                        </div>`;
                });
            }

            // Motor de Búsqueda Principal Asíncrono
            async function ejecutarBusqueda() {
                const term = normalizar(searchInput.value);
                if (!term || datosActuales.length === 0) return;

                // 1. Buscamos primero en el CSV textualmente
                let resultadosLocales = datosActuales.filter(item => 
                    normalizar(item.denominacion).includes(term) || 
                    normalizar(item.descripcion).includes(term) || 
                    item.objeto.includes(term)
                );

                if (resultadosLocales.length > 0) {
                    mostrarResultados(resultadosLocales.slice(0, 100), `Encontrado localmente: ${resultadosLocales.length} registros`);
                    return;
                }

                // 2. Si no encuentra nada, llamamos a la IA
                resultsList.innerHTML = `<div class="bg-blue-50 p-8 text-center text-blue-600 font-bold rounded-xl border border-blue-200 animate-pulse">🧠 Analizando concepto con Inteligencia Artificial...</div>`;
                resultsLabel.textContent = "Conectando con Google Gemini...";

                try {
                    const response = await fetch(`/.netlify/functions/clasificador?q=${encodeURIComponent(term)}`);
                    const data = await response.json();
                    
                    if (data.codigo && data.codigo !== "000") {
                        // La IA nos devolvió un código (ej. 111). Filtramos el CSV por ese código.
                        const resultadosIA = datosActuales.filter(item => item.objeto.startsWith(data.codigo));
                        mostrarResultados(resultadosIA.slice(0, 50), `✨ La IA clasificó "${term}" en el Grupo ${data.codigo}`);
                    } else {
                        mostrarResultados([], "Ni la IA pudo determinar a qué grupo pertenece.");
                    }
                } catch (error) {
                    mostrarResultados([], "Error de conexión con la Inteligencia Artificial.");
                }
            }

            // Debounce: Espera 800ms luego de dejar de escribir para no saturar la IA
            searchInput.addEventListener('input', () => {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(ejecutarBusqueda, 800);
            });
        });
    </script>
</body>
</html>
