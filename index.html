<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contaduría - Hospital de Flores</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <nav class="bg-[#003ca5] text-white shadow-lg sticky top-0 z-50 py-5 px-6">
        <h1 class="text-xl md:text-2xl font-bold uppercase">Hospital de Flores "Edison Camacho"</h1>
        <p class="text-sm text-blue-200 uppercase tracking-widest mt-1">Sector Contaduría • Buscador Inteligente</p>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8 flex flex-col md:flex-row gap-8">
        
        <div class="flex-1 flex flex-col gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <label class="block text-sm font-semibold text-slate-600 mb-2 uppercase">Buscar Objeto de Gasto</label>
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Ej. Legumbre, Regla, Codo, 011..." 
                           class="w-full pl-4 pr-12 py-3 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 transition-colors font-medium">
                    <button id="clearBtn" class="hidden absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 p-1">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div class="mt-3 text-xs text-slate-500 font-bold" id="resultsLabel">Cargando padrón...</div>
            </div>
            
            <!-- Aquí se inyectan las tarjetas directamente -->
            <div id="resultsList" class="space-y-4 pb-8"></div>
        </div>

        <div class="w-full md:w-80 flex-shrink-0">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 sticky top-28">
                <h3 id="dbTitle" class="font-bold text-slate-800 mb-2">🗄️ Base de Datos</h3>
                <p id="dbDesc" class="text-sm text-slate-500 mb-6">El sistema usa Inteligencia Artificial para clasificar insumos por su naturaleza si no figuran en la CGN.</p>
                
                <button id="uploadBtn" class="w-full py-3 px-4 bg-[#003ca5] text-white rounded-lg font-semibold mb-3 flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    Cargar Padrón CSV
                </button>
                <input type="file" id="csvFileInput" class="hidden" accept=".csv">
                <button id="restoreBtn" class="hidden w-full py-3 px-4 bg-slate-100 text-slate-700 rounded-lg font-semibold border border-slate-300">Restaurar Original</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <span class="text-xs text-slate-400 font-bold uppercase tracking-widest text-center sm:text-left">
                Hospital de Flores "Edison Camacho" • Sector Contaduría
            </span>
            <span class="text-xs text-[#003ca5] font-black uppercase tracking-widest bg-blue-50 px-4 py-2 rounded-full border border-blue-100">
                MPG 2026
            </span>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // Datos por defecto (fallback)
            const DATOS_POR_DEFECTO = [
                { objeto: "111", auxiliar: "000", denominacion: "Alimentos para personas", descripcion: "Comprende los gastos en concepto de productos alimenticios, víveres, carnes, lácteos, azúcar, aceite y provisiones." },
                { objeto: "131", auxiliar: "000", denominacion: "Útiles de escritorio, oficina y enseñanza", descripcion: "Comprende los gastos de papel, artículos de escritorio, útiles de oficina, bolígrafos, resmas, carpetas." },
                { objeto: "141", auxiliar: "000", denominacion: "Artículos de caucho y plástico", descripcion: "Comprende productos manufacturados de caucho y plástico como caños PVC, accesorios, polietileno." },
                { objeto: "151", auxiliar: "000", denominacion: "Productos de limpieza", descripcion: "Comprende productos para la higiene y limpieza del establecimiento: lavandina, escobas, jabón." },
                { objeto: "156", auxiliar: "000", denominacion: "Artículos y accesorios para sanitaria", descripcion: "Comprende los elementos destinados a instalaciones sanitarias y plomería: codos, válvulas, grifería." },
                { objeto: "181", auxiliar: "000", denominacion: "Medicamentos y farmacéuticos", descripcion: "Comprende los gastos en medicamentos e insumos médicos, farmacia, gasas, jeringas." },
                { objeto: "142", auxiliar: "000", denominacion: "Materiales eléctricos", descripcion: "Comprende lámparas, cables, tomacorrientes y afines." },
                { objeto: "149", auxiliar: "000", denominacion: "Herramientas menores", descripcion: "Comprende herramientas manuales, repuestos y ferretería." }
            ];

            let datosActuales = [...DATOS_POR_DEFECTO];
            let timeoutId = null;

            const searchInput = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearBtn');
            const resultsList = document.getElementById('resultsList');
            const resultsLabel = document.getElementById('resultsLabel');

            const normalizar = (text) => text ? text.toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";

            // --- Lógica de carga del CSV ---
            document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('csvFileInput').click());
            
            document.getElementById('csvFileInput').addEventListener('change', function(e) {
                Papa.parse(e.target.files[0], {
                    header: true, skipEmptyLines: true, encoding: "ISO-8859-1",
                    complete: function(results) {
                        const cleanField = (f) => f ? normalizar(f).replace(/[^a-z0-9]/g, '') : "";
                        const fields = results.meta.fields;
                        const keyObjeto = fields.find(f => cleanField(f).includes('objeto')) || fields[0];
                        const keyAux = fields.find(f => cleanField(f).includes('auxiliar') || cleanField(f).includes('subgrupo')) || fields[1];
                        const keyDenom = fields.find(f => cleanField(f).includes('denominacion') || cleanField(f).includes('nombre')) || fields[2];
                        const keyDesc = fields.find(f => cleanField(f).includes('desc')) || fields[3];

                        datosActuales = results.data.map((row, id) => ({
                            id, objeto: row[keyObjeto] ? row[keyObjeto].trim() : "",
                            auxiliar: row[keyAux] ? row[keyAux].trim() : "",
                            denominacion: row[keyDenom] ? row[keyDenom].trim() : "",
                            descripcion: row[keyDesc] ? row[keyDesc].trim() : ""
                        }));
                        
                        document.getElementById('uploadBtn').classList.add('hidden');
                        document.getElementById('restoreBtn').classList.remove('hidden');
                        resultsLabel.textContent = `Padrón cargado. Puede buscar.`;
                        ejecutarBusqueda();
                    }
                });
            });

            document.getElementById('restoreBtn').addEventListener('click', () => {
                datosActuales = [...DATOS_POR_DEFECTO];
                document.getElementById('csvFileInput').value = '';
                document.getElementById('uploadBtn').classList.remove('hidden');
                document.getElementById('restoreBtn').classList.add('hidden');
                resultsLabel.textContent = `Base de datos restaurada.`;
                ejecutarBusqueda();
            });

            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                clearBtn.classList.add('hidden');
                ejecutarBusqueda();
                searchInput.focus();
            });

            // --- Renderizado Gráfico (Tarjetas Oficiales + Explicación IA integrada) ---
            function mostrarResultados(lista, mensaje, explicacionIA = null) {
                resultsLabel.textContent = mensaje;
                
                if(lista.length === 0) {
                    resultsList.innerHTML = `<div class="bg-white p-8 text-center text-slate-500 rounded-xl border border-slate-200"><span class="text-3xl block mb-2">🔍</span>No se encontraron resultados.</div>`;
                    return;
                }
                
                let htmlContent = '';
                lista.forEach(item => {
                    
                    // Si la IA nos dio una explicación, la insertamos como un recuadro limpio dentro de la tarjeta
                    let bloqueExplicacion = '';
                    if (explicacionIA) {
                        bloqueExplicacion = `
                            <div class="mt-4 bg-blue-50/50 p-4 rounded-lg border border-blue-100">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-blue-600 text-lg">✨</span>
                                    <span class="text-xs font-bold text-blue-800 uppercase tracking-wider">Análisis de la Inteligencia Artificial</span>
                                </div>
                                <p class="text-sm text-blue-900 leading-relaxed">${explicacionIA}</p>
                            </div>
                        `;
                    }

                    htmlContent += `
                        <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 hover:border-[#003ca5] transition-colors relative overflow-hidden">
                            ${explicacionIA ? '<div class="absolute top-0 left-0 w-1 h-full bg-[#003ca5]"></div>' : ''}
                            
                            <div class="flex flex-col md:flex-row justify-between items-start gap-4 mb-3 ${explicacionIA ? 'pl-2' : ''}">
                                <h3 class="font-bold text-lg text-[#003ca5] uppercase flex-1">${item.denominacion || 'SIN DENOMINACIÓN'}</h3>
                                <div class="flex gap-2 shrink-0">
                                    <div class="bg-[#003ca5] text-white px-3 py-1 rounded text-sm text-center font-bold shadow"><span class="block text-[10px] opacity-80 uppercase font-normal">Objeto</span>${item.objeto}</div>
                                    <div class="bg-slate-100 px-3 py-1 rounded text-sm text-slate-700 border border-slate-300 text-center font-bold shadow-sm"><span class="block text-[10px] opacity-80 uppercase font-normal">Auxiliar</span>${item.auxiliar}</div>
                                </div>
                            </div>
                            <p class="text-sm text-slate-600 italic border-l-2 border-[#003ca5] pl-3 ${explicacionIA ? 'ml-2' : ''}">${item.descripcion}</p>
                            
                            ${bloqueExplicacion}
                        </div>`;
                });
                
                resultsList.innerHTML = htmlContent;
            }

            // --- Motor de Búsqueda Principal ---
            async function ejecutarBusqueda() {
                const term = normalizar(searchInput.value);
                
                if (!term) {
                    clearBtn.classList.add('hidden');
                    mostrarResultados(datosActuales.slice(0, 50), `Mostrando registros del padrón...`);
                    return;
                }

                clearBtn.classList.remove('hidden');

                // 1. MOTOR LOCAL
                const searchWords = term.split(/\s+/).filter(w => w.length > 0);
                const scoredItems = datosActuales.map(item => {
                    let score = 0;
                    const denom = normalizar(item.denominacion);
                    const desc = normalizar(item.descripcion);
                    const obj = normalizar(item.objeto);
                    const aux = normalizar(item.auxiliar);
                    const fullText = `${obj} ${aux} ${denom} ${desc}`;

                    searchWords.forEach(word => {
                        if (fullText.includes(word)) {
                            score += 10;
                            if (denom.includes(word)) score += 20;
                            if (obj === word || aux === word || obj.startsWith(word)) score += 50; 
                        }
                    });
                    return { item, score };
                });

                let resultadosLocales = scoredItems.filter(x => x.score > 0).sort((a, b) => b.score - a.score).map(x => x.item);

                // Si encuentra localmente de forma exacta, los muestra.
                if (resultadosLocales.length > 0) {
                    mostrarResultados(resultadosLocales.slice(0, 50), `Coincidencias en la base de datos CGN:`);
                    return;
                }

                // 2. MOTOR IA (Se activa cuando la palabra no existe, ej: "Rúcula", "Legumbre", "Regla")
                resultsList.innerHTML = `<div class="bg-blue-50 p-6 text-center text-[#003ca5] font-bold rounded-xl border border-blue-200 animate-pulse">🧠 Analizando la naturaleza del artículo...</div>`;
                resultsLabel.textContent = "Buscando en catálogo de la Inteligencia Artificial...";

                const apiKey = "AIzaSyDMgS7T3XxsNpUdkBwU2jHqmmoh3ExDmY0"; 
                
                // Pedimos a la IA que responda en un formato estructurado (JSON) para que NUNCA alucine.
                const prompt = `Actúa como un analista del Clasificador del Estado Uruguayo.
El usuario quiere clasificar el insumo: "${term}".
Debes devolver un objeto JSON con dos campos exactos:
1. "codigo": Solo puede ser uno de estos exactos de 3 dígitos: 111 (Alimentos/Legumbres/Verduras), 131 (Oficina/Papelería/Reglas), 141 (Plástico/PVC), 151 (Limpieza), 156 (Sanitaria/Plomería), 181 (Farmacia), 142 (Eléctrico), 149 (Herramientas).
2. "explicacion": Una breve y profesional descripción de qué es el artículo y por qué encaja en ese grupo (ej. "Es una materia prima o componente para la preparación de comidas").

Responde ÚNICAMENTE con el JSON. Nada de texto fuera de las llaves.`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const data = await response.json();
                    
                    // Parseamos la respuesta segura de la IA
                    const respuestaIA = JSON.parse(data.candidates[0].content.parts[0].text);
                    const codigoRecomendado = respuestaIA.codigo;
                    const explicacionDada = respuestaIA.explicacion;
                    
                    if (codigoRecomendado && codigoRecomendado !== "000") {
                        // Relacionamos el número exacto con el padrón
                        const resultadosIA = datosActuales.filter(item => item.objeto.startsWith(codigoRecomendado));
                        
                        if(resultadosIA.length > 0) {
                            // AQUÍ ESTÁ LA MAGIA: Le pasamos la tarjeta oficial + la explicación de la IA
                            mostrarResultados(resultadosIA.slice(0, 50), `Sugerencia basada en la naturaleza del insumo:`, explicacionDada);
                        } else {
                            mostrarResultados([], `La IA determinó que pertenece al objeto ${codigoRecomendado}, pero no está en la planilla cargada.`);
                        }
                    } else {
                        mostrarResultados([], "No se logró determinar a qué grupo de gasto pertenece.");
                    }
                } catch (error) {
                    mostrarResultados([], "Error en el razonamiento de la IA. Intente con otra palabra.");
                }
            }

            // Temporizador
            searchInput.addEventListener('input', () => {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(ejecutarBusqueda, 1000);
            });

            mostrarResultados(datosActuales.slice(0, 50), "Padrón activo listo para usar.");
        });
    </script>
</body>
</html>
