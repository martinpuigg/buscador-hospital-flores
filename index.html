<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contaduría - Hospital de Flores</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <!-- Navegación con Logo -->
    <nav class="bg-[#1e3a8a] text-white shadow-lg sticky top-0 z-50 py-4 px-6 flex items-center gap-4">
        <!-- AQUÍ VA TU LOGO -->
        <img src="logo.png" alt="Logo Hospital" class="h-12 w-auto object-contain bg-white rounded-full p-1" onerror="this.style.display='none'">
        
        <div>
            <h1 class="text-xl md:text-2xl font-extrabold uppercase tracking-tight">Hospital de Flores</h1>
            <p class="text-xs text-blue-200 uppercase tracking-widest mt-1">Buscador de Compras CGN</p>
        </div>
    </nav>

    <main class="flex-grow max-w-3xl mx-auto w-full px-4 py-8 flex flex-col gap-6">
        
        <!-- Buscador -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <input type="text" id="searchInput" placeholder="Buscar insumo (ej. Legumbre, Lápiz, 111...)" 
                   class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-[#1e3a8a] transition-colors text-lg font-medium placeholder-slate-400">
            <div class="mt-3 text-sm text-slate-500 font-semibold" id="resultsLabel">Cargando base de datos...</div>
        </div>

        <!-- Botones de Carga -->
        <div class="flex gap-4">
            <button id="uploadBtn" class="flex-1 py-3 px-4 bg-slate-200 text-slate-700 hover:bg-slate-300 rounded-xl font-bold text-sm uppercase tracking-wide transition-colors flex justify-center items-center gap-2">
                📂 Cargar Padrón CSV
            </button>
            <input type="file" id="csvFileInput" class="hidden" accept=".csv">
            <button id="restoreBtn" class="hidden flex-1 py-3 px-4 bg-red-100 text-red-700 hover:bg-red-200 rounded-xl font-bold text-sm uppercase tracking-wide transition-colors">
                Restaurar Original
            </button>
        </div>
        
        <!-- Contenedor de Resultados -->
        <div id="resultsList" class="space-y-6 pb-12"></div>
        
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-6 mt-auto">
        <div class="max-w-3xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-between gap-4">
            <span class="text-xs text-slate-400 font-bold uppercase tracking-widest text-center sm:text-left">
                Hospital de Flores • Sector Contaduría
            </span>
            <span class="text-xs text-[#1e3a8a] font-black uppercase tracking-widest bg-blue-50 px-4 py-2 rounded-full border border-blue-100">
                MPG 2026
            </span>
        </div>
    </footer>

    <script>
        // ======================================================================
        // PON TU LLAVE API AQUÍ ABAJO (Ya te dejé pegada la que me pasaste)
        const GEMINI_API_KEY = "AIzaSyDMgS7T3XxsNpUdkBwU2jHqmmoh3ExDmY0";
        // ======================================================================

        document.addEventListener('DOMContentLoaded', () => {
            
            // Padrón por defecto (Fallback)
            const DATOS_POR_DEFECTO = [
                { objeto: "111", auxiliar: "000", denominacion: "Alimentos para personas", descripcion: "Comprende los gastos en concepto de productos alimenticios, víveres, carnes, lácteos, azúcar, aceite y provisiones generales." },
                { objeto: "131", auxiliar: "000", denominacion: "Útiles de escritorio, oficina y enseñanza", descripcion: "Comprende los gastos de papel, artículos de escritorio, útiles de oficina, bolígrafos, resmas, carpetas, lápices y afines." },
                { objeto: "141", auxiliar: "000", denominacion: "Artículos de caucho y plástico", descripcion: "Comprende productos manufacturados de caucho y plástico como caños PVC, accesorios, polietileno y tubos." },
                { objeto: "151", auxiliar: "000", denominacion: "Productos de limpieza", descripcion: "Comprende productos para la higiene y limpieza del establecimiento: lavandina, escobas, jabón, detergente, desinfectantes." },
                { objeto: "156", auxiliar: "000", denominacion: "Artículos y accesorios para sanitaria", descripcion: "Comprende los elementos destinados a instalaciones sanitarias y plomería: codos, válvulas, grifería, teflón, piletas." },
                { objeto: "181", auxiliar: "000", denominacion: "Medicamentos y productos farmacéuticos", descripcion: "Comprende los gastos en medicamentos e insumos médicos, farmacia, gasas, jeringas, sueros." },
                { objeto: "142", auxiliar: "000", denominacion: "Materiales eléctricos", descripcion: "Comprende lámparas, cables, tomacorrientes y afines." },
                { objeto: "149", auxiliar: "000", denominacion: "Herramientas menores", descripcion: "Comprende herramientas manuales, repuestos y ferretería." }
            ];

            let datosActuales = [...DATOS_POR_DEFECTO];
            let timeoutId = null;

            const searchInput = document.getElementById('searchInput');
            const resultsList = document.getElementById('resultsList');
            const resultsLabel = document.getElementById('resultsLabel');

            const normalizar = (text) => text ? text.toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";

            // --- Carga del Archivo CSV ---
            document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('csvFileInput').click());
            
            document.getElementById('csvFileInput').addEventListener('change', function(e) {
                Papa.parse(e.target.files[0], {
                    header: true, skipEmptyLines: true, encoding: "ISO-8859-1",
                    complete: function(results) {
                        const cleanField = (f) => f ? normalizar(f).replace(/[^a-z0-9]/g, '') : "";
                        const fields = results.meta.fields;
                        const keyObjeto = fields.find(f => cleanField(f).includes('objeto')) || fields[0];
                        const keyAux = fields.find(f => cleanField(f).includes('auxiliar') || cleanField(f).includes('subgrupo')) || fields[1];
                        const keyDenom = fields.find(f => cleanField(f).includes('denominacion') || cleanField(f).includes('nombre')) || fields[2];
                        const keyDesc = fields.find(f => cleanField(f).includes('desc')) || fields[3];

                        datosActuales = results.data.map((row, id) => ({
                            id, objeto: row[keyObjeto] ? row[keyObjeto].trim() : "",
                            auxiliar: row[keyAux] ? row[keyAux].trim() : "",
                            denominacion: row[keyDenom] ? row[keyDenom].trim() : "",
                            descripcion: row[keyDesc] ? row[keyDesc].trim() : ""
                        }));
                        
                        document.getElementById('uploadBtn').classList.add('hidden');
                        document.getElementById('restoreBtn').classList.remove('hidden');
                        ejecutarBusqueda();
                    }
                });
            });

            document.getElementById('restoreBtn').addEventListener('click', () => {
                datosActuales = [...DATOS_POR_DEFECTO];
                document.getElementById('csvFileInput').value = '';
                document.getElementById('uploadBtn').classList.remove('hidden');
                document.getElementById('restoreBtn').classList.add('hidden');
                ejecutarBusqueda();
            });

            // --- 1. Renderizado Gráfico: Tarjeta de Explicación IA (Borde Azul) ---
            function mostrarExplicacionIA(explicacion) {
                resultsList.innerHTML = `
                    <div class="bg-white border-2 border-[#1e3a8a] rounded-xl p-6 mb-2 shadow-sm">
                        <p class="text-slate-700 text-lg font-medium leading-relaxed">${explicacion}</p>
                    </div>
                `;
            }

            // --- 2. Renderizado Gráfico: Tarjeta Oficial CGN (Beige con pastilla azul) ---
            function mostrarTarjetasCGN(lista, esIA = false) {
                if (!esIA) resultsList.innerHTML = ''; // Si no es IA, limpia el contenedor antes
                
                lista.forEach(item => {
                    const etiquetaRelevancia = esIA 
                        ? `<div class="text-[#1e3a8a] font-bold text-sm tracking-wide">Relevancia: 80%</div>` 
                        : '';

                    resultsList.innerHTML += `
                        <div class="bg-[#fffbf7] border-l-[6px] border-[#f97316] p-6 rounded-2xl shadow-sm mb-4">
                            <div class="flex flex-wrap justify-between items-center gap-3 mb-4">
                                <!-- Pastilla Azul Oscuro con el Objeto -->
                                <div class="bg-[#1e3a8a] text-white font-bold px-5 py-1.5 rounded-full text-sm shadow-sm tracking-wide">
                                    Objeto ${item.objeto} / ${item.auxiliar}
                                </div>
                                ${etiquetaRelevancia}
                            </div>
                            <h3 class="font-extrabold text-2xl text-slate-800 mb-2">${item.denominacion || 'SIN DENOMINACIÓN'}</h3>
                            <p class="text-slate-600 font-medium leading-relaxed">${item.descripcion}</p>
                        </div>`;
                });
            }

            // --- Motor de Búsqueda ---
            async function ejecutarBusqueda() {
                const term = normalizar(searchInput.value);
                
                if (!term) {
                    resultsLabel.textContent = `Mostrando primeros registros...`;
                    mostrarTarjetasCGN(datosActuales.slice(0, 50));
                    return;
                }

                // A. Busca en el CSV localmente primero
                const searchWords = term.split(/\s+/).filter(w => w.length > 0);
                const scoredItems = datosActuales.map(item => {
                    let score = 0;
                    const denom = normalizar(item.denominacion);
                    const desc = normalizar(item.descripcion);
                    const obj = normalizar(item.objeto);
                    
                    searchWords.forEach(word => {
                        if (denom.includes(word) || desc.includes(word) || obj.includes(word)) score += 10;
                        if (obj === word || obj.startsWith(word)) score += 50; 
                    });
                    return { item, score };
                });

                let resultadosLocales = scoredItems.filter(x => x.score > 0).sort((a, b) => b.score - a.score).map(x => x.item);

                // Si encuentra una coincidencia exacta y fuerte localmente, la muestra.
                if (resultadosLocales.length > 0 && resultadosLocales[0].denominacion.toLowerCase().includes(term)) {
                    resultsLabel.textContent = `Búsqueda en padrón CGN`;
                    mostrarTarjetasCGN(resultadosLocales.slice(0, 50));
                    return;
                }

                // B. Si la palabra es rara (ej. Legumbre), llama a la IA
                resultsList.innerHTML = `<div class="bg-blue-50 p-6 text-center text-[#1e3a8a] font-bold rounded-2xl border-2 border-blue-200 animate-pulse text-lg">Analizando concepto con IA...</div>`;
                resultsLabel.textContent = "Conectando con Inteligencia Artificial...";

                // Pedimos a la IA la descripción limpia y el código por separado
                const prompt = `Analiza el artículo: "${term}".
Devuelve ÚNICAMENTE un objeto JSON válido con este formato exacto:
{
  "explicacion": "Se trata de un/una [descripcion breve] para [uso].",
  "codigo": "111"
}

Códigos válidos: 111 (Alimentos), 131 (Oficina/Escritorio), 141 (Plásticos), 151 (Limpieza), 156 (Sanitaria/Caños), 181 (Farmacia), 142 (Eléctrico), 149 (Herramientas). Si no encaja en ninguno, usa "000".
IMPORTANTE: No agregues ningún otro texto, solo el JSON puro.`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });

                    const data = await response.json();
                    
                    // Limpieza del JSON
                    let textoRespuesta = data.candidates[0].content.parts[0].text.trim();
                    textoRespuesta = textoRespuesta.replace(/```json/g, '').replace(/```/g, '').trim();
                    const resultadoIA = JSON.parse(textoRespuesta);
                    
                    if (resultadoIA.codigo && resultadoIA.codigo !== "000") {
                        const resultadosOficiales = datosActuales.filter(item => item.objeto.startsWith(resultadoIA.codigo));
                        
                        resultsLabel.textContent = `Asociado por Inteligencia Artificial`;
                        
                        // 1. Muestra la tarjeta del borde azul con la descripción
                        mostrarExplicacionIA(resultadoIA.explicacion);
                        // 2. Muestra abajo la tarjeta beige con el objeto
                        mostrarTarjetasCGN(resultadosOficiales.slice(0, 10), true);
                    } else {
                        resultsList.innerHTML = `<div class="bg-white p-6 text-center text-slate-500 rounded-2xl border border-slate-200">No se determinó a qué grupo pertenece.</div>`;
                    }
                } catch (error) {
                    console.error("Error en la IA:", error);
                    resultsList.innerHTML = `<div class="bg-white p-6 text-center text-slate-500 rounded-2xl border border-slate-200">La palabra exacta no figura en el listado de la CGN.</div>`;
                }
            }

            // Temporizador
            searchInput.addEventListener('input', () => {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(ejecutarBusqueda, 1000); 
            });

            // Arranque
            mostrarTarjetasCGN(datosActuales.slice(0, 50));
        });
    </script>
</body>
</html>
