<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contaduría - Hospital de Flores</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <nav class="bg-[#003ca5] text-white shadow-lg sticky top-0 z-50 py-5 px-6">
        <h1 class="text-xl md:text-2xl font-bold uppercase">Hospital de Flores "Edison Camacho"</h1>
        <p class="text-sm text-blue-200 uppercase tracking-widest mt-1">Sector Contaduría • Buscador Inteligente</p>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8 flex flex-col md:flex-row gap-8">
        
        <div class="flex-1 flex flex-col gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <label class="block text-sm font-semibold text-slate-600 mb-2 uppercase">Buscar Objeto de Gasto</label>
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Ej. Legumbre, Regla, Codo, 011..." 
                           class="w-full pl-4 pr-12 py-3 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#003ca5] transition-colors font-medium">
                    <button id="clearBtn" class="hidden absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 p-1">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div class="mt-3 text-xs text-slate-500 font-bold" id="resultsLabel">Cargando padrón...</div>
            </div>
            
            <!-- Aquí se inyectan las tarjetas de resultados -->
            <div id="resultsList" class="space-y-4 pb-8"></div>
        </div>

        <div class="w-full md:w-80 flex-shrink-0">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 sticky top-28">
                <h3 id="dbTitle" class="font-bold text-slate-800 mb-2">🗄️ Base de Datos</h3>
                <p id="dbDesc" class="text-sm text-slate-500 mb-6">El sistema usa IA para describir y clasificar insumos que no figuran explícitamente en el padrón.</p>
                
                <button id="uploadBtn" class="w-full py-3 px-4 bg-[#003ca5] text-white rounded-lg font-semibold mb-3 flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    Cargar Padrón CSV
                </button>
                <input type="file" id="csvFileInput" class="hidden" accept=".csv">
                <button id="restoreBtn" class="hidden w-full py-3 px-4 bg-slate-100 text-slate-700 rounded-lg font-semibold border border-slate-300">Restaurar Original</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <span class="text-xs text-slate-400 font-bold uppercase tracking-widest text-center sm:text-left">
                Hospital de Flores "Edison Camacho" • Sector Contaduría
            </span>
            <span class="text-xs text-[#003ca5] font-black uppercase tracking-widest bg-blue-50 px-4 py-2 rounded-full border border-blue-100">
                MPG 2026
            </span>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // Datos por defecto (fallback)
            const DATOS_POR_DEFECTO = [
                { objeto: "111", auxiliar: "000", denominacion: "Alimentos para personas", descripcion: "Comprende los gastos en concepto de productos alimenticios, víveres, carnes, lácteos, azúcar, aceite y provisiones." },
                { objeto: "131", auxiliar: "000", denominacion: "Útiles de escritorio, oficina y enseñanza", descripcion: "Comprende los gastos de papel, artículos de escritorio, útiles de oficina, bolígrafos, resmas, carpetas." },
                { objeto: "141", auxiliar: "000", denominacion: "Artículos de caucho y plástico", descripcion: "Comprende productos manufacturados de caucho y plástico como caños PVC, accesorios, polietileno." },
                { objeto: "151", auxiliar: "000", denominacion: "Productos de limpieza", descripcion: "Comprende productos para la higiene y limpieza del establecimiento: lavandina, escobas, jabón." },
                { objeto: "156", auxiliar: "000", denominacion: "Artículos y accesorios para sanitaria", descripcion: "Comprende los elementos destinados a instalaciones sanitarias y plomería: codos, válvulas, grifería." },
                { objeto: "181", auxiliar: "000", denominacion: "Medicamentos y farmacéuticos", descripcion: "Comprende los gastos en medicamentos e insumos médicos, farmacia, gasas, jeringas." },
                { objeto: "142", auxiliar: "000", denominacion: "Materiales eléctricos", descripcion: "Comprende lámparas, cables, tomacorrientes y afines." },
                { objeto: "149", auxiliar: "000", denominacion: "Herramientas menores", descripcion: "Comprende herramientas manuales, repuestos y ferretería." }
            ];

            let datosActuales = [...DATOS_POR_DEFECTO];
            let timeoutId = null;

            const searchInput = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearBtn');
            const resultsList = document.getElementById('resultsList');
            const resultsLabel = document.getElementById('resultsLabel');

            const normalizar = (text) => text ? text.toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";

            // --- Lógica de carga del CSV ---
            document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('csvFileInput').click());
            
            document.getElementById('csvFileInput').addEventListener('change', function(e) {
                Papa.parse(e.target.files[0], {
                    header: true, skipEmptyLines: true, encoding: "ISO-8859-1",
                    complete: function(results) {
                        const cleanField = (f) => f ? normalizar(f).replace(/[^a-z0-9]/g, '') : "";
                        const fields = results.meta.fields;
                        const keyObjeto = fields.find(f => cleanField(f).includes('objeto')) || fields[0];
                        const keyAux = fields.find(f => cleanField(f).includes('auxiliar') || cleanField(f).includes('subgrupo')) || fields[1];
                        const keyDenom = fields.find(f => cleanField(f).includes('denominacion') || cleanField(f).includes('nombre')) || fields[2];
                        const keyDesc = fields.find(f => cleanField(f).includes('desc')) || fields[3];

                        datosActuales = results.data.map((row, id) => ({
                            id, objeto: row[keyObjeto] ? row[keyObjeto].trim() : "",
                            auxiliar: row[keyAux] ? row[keyAux].trim() : "",
                            denominacion: row[keyDenom] ? row[keyDenom].trim() : "",
                            descripcion: row[keyDesc] ? row[keyDesc].trim() : ""
                        }));
                        
                        document.getElementById('uploadBtn').classList.add('hidden');
                        document.getElementById('restoreBtn').classList.remove('hidden');
                        ejecutarBusqueda();
                    }
                });
            });

            document.getElementById('restoreBtn').addEventListener('click', () => {
                datosActuales = [...DATOS_POR_DEFECTO];
                document.getElementById('csvFileInput').value = '';
                document.getElementById('uploadBtn').classList.remove('hidden');
                document.getElementById('restoreBtn').classList.add('hidden');
                ejecutarBusqueda();
            });

            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                clearBtn.classList.add('hidden');
                ejecutarBusqueda();
                searchInput.focus();
            });

            // --- Renderizado Gráfico ---
            function mostrarResultadosLocales(lista) {
                resultsList.innerHTML = '';
                resultsLabel.textContent = `Mostrando coincidencias locales (${lista.length})`;
                
                lista.forEach(item => {
                    resultsList.innerHTML += `
                        <div class="bg-[#fff9f2] border-l-4 border-[#f97316] p-5 rounded-xl shadow-sm mb-4">
                            <div class="flex justify-between items-center mb-3">
                                <div class="bg-[#003ca5] text-white font-bold px-4 py-1 rounded-full text-sm">Objeto ${item.objeto} / ${item.auxiliar}</div>
                            </div>
                            <h3 class="font-bold text-xl mt-1 text-slate-800 uppercase">${item.denominacion || 'SIN DENOMINACIÓN'}</h3>
                            <p class="text-sm text-slate-600 mt-2">${item.descripcion}</p>
                        </div>`;
                });
            }

            function mostrarResultadosIA(explicacion, listaObjetos) {
                resultsList.innerHTML = '';
                resultsLabel.textContent = `Resultados analizados por Inteligencia Artificial`;

                // 1. Tarjeta de Explicación de la IA (Limpia, sin números ni botones naranjas)
                resultsList.innerHTML += `
                    <div class="bg-white border-2 border-[#003ca5] rounded-xl p-6 mb-6 shadow-sm">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-2xl">💡</span>
                            <h4 class="font-bold text-[#003ca5] uppercase text-sm tracking-wider">Análisis del Artículo</h4>
                        </div>
                        <p class="text-slate-700 text-lg leading-relaxed">${explicacion}</p>
                    </div>
                `;

                // 2. Tarjeta Oficial de la Denominación CGN
                if(listaObjetos.length === 0) {
                    resultsList.innerHTML += `<div class="bg-white p-6 text-center text-slate-500 rounded-xl border border-slate-200">No hay registros oficiales para la categoría sugerida.</div>`;
                    return;
                }

                listaObjetos.forEach(item => {
                    resultsList.innerHTML += `
                        <div class="bg-[#fff9f2] border-l-4 border-[#f97316] p-5 rounded-xl shadow-sm mb-4">
                            <div class="flex justify-between items-center mb-3">
                                <div class="bg-[#003ca5] text-white font-bold px-4 py-1 rounded-full text-sm tracking-wide">Objeto ${item.objeto} / ${item.auxiliar}</div>
                                <div class="text-[#003ca5] bg-blue-100 font-bold text-xs px-3 py-1 rounded-full">Relevancia: Sugerido por IA</div>
                            </div>
                            <h3 class="font-bold text-xl mt-1 text-slate-800 uppercase">${item.denominacion || 'SIN DENOMINACIÓN'}</h3>
                            <p class="text-sm text-slate-600 mt-2">${item.descripcion}</p>
                        </div>`;
                });
            }

            // --- Motor de Búsqueda Principal ---
            async function ejecutarBusqueda() {
                const term = normalizar(searchInput.value);
                
                if (!term) {
                    clearBtn.classList.add('hidden');
                    mostrarResultadosLocales(datosActuales.slice(0, 50));
                    return;
                }

                clearBtn.classList.remove('hidden');

                // 1. Búsqueda Local Exacta
                const searchWords = term.split(/\s+/).filter(w => w.length > 0);
                const scoredItems = datosActuales.map(item => {
                    let score = 0;
                    const denom = normalizar(item.denominacion);
                    const desc = normalizar(item.descripcion);
                    const obj = normalizar(item.objeto);
                    
                    searchWords.forEach(word => {
                        if (denom.includes(word) || desc.includes(word) || obj.includes(word)) score += 10;
                        if (obj === word || obj.startsWith(word)) score += 50; 
                    });
                    return { item, score };
                });

                let resultadosLocales = scoredItems.filter(x => x.score > 0).sort((a, b) => b.score - a.score).map(x => x.item);

                // Si encontramos un match local muy obvio, lo mostramos directo
                if (resultadosLocales.length > 0 && resultadosLocales[0].denominacion.toLowerCase().includes(term)) {
                    mostrarResultadosLocales(resultadosLocales.slice(0, 50));
                    return;
                }

                // 2. Llamada a la IA para clasificar "Legumbre", "Regla", etc.
                resultsList.innerHTML = `<div class="bg-blue-50 p-6 text-center text-[#003ca5] font-bold rounded-xl border border-blue-200 animate-pulse text-lg">🧠 Analizando la consulta...</div>`;
                resultsLabel.textContent = "Conectando con el motor inteligente...";

                const apiKey = "AIzaSyDMgS7T3XxsNpUdkBwU2jHqmmoh3ExDmY0"; 
                
                // Pedimos explícitamente formato JSON para que NO invente textos sueltos ni botones.
                const prompt = `Actúa como un analista de compras del Estado Uruguayo.
Analiza este insumo a comprar: "${term}".
Devuelve ÚNICAMENTE un objeto JSON válido con estos dos campos exactos:
1. "descripcion": Una explicación natural y directa de qué es este artículo o para qué sirve (máximo 20 palabras). NO menciones ningún número ni código presupuestal aquí.
2. "codigo": El código exacto de 3 dígitos al que pertenece, eligiendo ESTRICTAMENTE de esta lista: 
   111 (Alimentos, legumbres, comidas), 131 (Útiles de escritorio, reglas de medir), 141 (Plásticos, PVC), 151 (Limpieza), 156 (Sanitaria, codos), 181 (Farmacia), 142 (Eléctrico), 149 (Herramientas).

Si no es ninguno, usa "000".
Ejemplo de formato requerido: {"descripcion": "Es una materia prima o componente para la preparación de comidas.", "codigo": "111"}`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });

                    const data = await response.json();
                    
                    // Limpiamos la respuesta por si la IA le pone comillas raras
                    let textoRespuesta = data.candidates[0].content.parts[0].text.trim();
                    textoRespuesta = textoRespuesta.replace(/```json/g, '').replace(/```/g, '').trim();
                    
                    const resultadoIA = JSON.parse(textoRespuesta);
                    
                    if (resultadoIA.codigo && resultadoIA.codigo !== "000") {
                        // Buscamos el código real en tu archivo CSV
                        const resultadosOficiales = datosActuales.filter(item => item.objeto.startsWith(resultadoIA.codigo));
                        
                        // Mostramos: Primero la descripción de la IA, luego la tarjeta oficial (ej. 111 / 000)
                        mostrarResultadosIA(resultadoIA.descripcion, resultadosOficiales.slice(0, 10));
                    } else {
                        resultsList.innerHTML = `<div class="bg-white p-6 text-center text-slate-500 rounded-xl border border-slate-200">No se logró determinar a qué grupo de gasto pertenece.</div>`;
                    }
                } catch (error) {
                    console.error(error);
                    resultsList.innerHTML = `<div class="bg-red-50 text-red-600 p-6 text-center rounded-xl border border-red-200">Error de conexión con la IA.</div>`;
                }
            }

            searchInput.addEventListener('input', () => {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(ejecutarBusqueda, 1000); // Espera 1 seg para no saturar
            });

            // Arranque
            mostrarResultadosLocales(datosActuales.slice(0, 50));
        });
    </script>
</body>
</html>
