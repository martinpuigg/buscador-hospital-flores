<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificador IA - Hospital de Flores</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #003ca5; --orange: #ff6b00; --green: #28a745; --gray: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--gray); padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Header */
        .header { border-bottom: 3px solid var(--blue); margin-bottom: 25px; padding-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { color: var(--blue); font-size: 1.6em; }
        
        /* Status & AI Panel */
        .status-panel { background: #eef2f7; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #d1d9e6; display: flex; justify-content: space-around; flex-wrap: wrap; gap: 10px; }
        .stat-badge { font-weight: 600; font-size: 0.9em; color: var(--blue); }
        .api-input-group { margin: 20px 0; text-align: center; background: #fff5f0; padding: 15px; border-radius: 10px; border: 1px dashed var(--orange); }
        input[type="password"] { padding: 10px; width: 300px; border: 2px solid #ddd; border-radius: 5px; outline: none; }
        
        /* Main UI */
        .upload-zone { border: 3px dashed var(--blue); padding: 40px; text-align: center; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .upload-zone:hover { background: #f0f4ff; }
        
        .search-section { display: none; margin-top: 20px; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-bar input { flex: 1; padding: 15px; font-size: 1.1em; border: 2px solid var(--blue); border-radius: 8px; }
        .search-bar button { padding: 15px 30px; background: var(--blue); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; }

        /* AI Result Card */
        #aiOutput { display: none; background: #fff8f0; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity:0; transform: translateY(-10px); } to { opacity:1; transform: translateY(0); } }
        
        .ai-confirm-btn { background: var(--green); color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: 600; width: 100%; }

        /* Results Table */
        .results-grid { display: grid; gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 10px; border: 1px solid #eee; border-left: 6px solid var(--blue); transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card:hover { transform: scale(1.01); }
        .card .code { font-weight: 800; color: var(--blue); font-size: 1.2em; }
        .card .title { font-weight: 700; margin: 5px 0; display: block; }
        .card .desc { font-size: 0.9em; color: #666; }
        .match-badge { background: #e8f5e9; color: var(--green); padding: 4px 8px; border-radius: 5px; font-size: 0.8em; float: right; font-weight: bold; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>🏥 Hospital de Flores "Edison Camacho"</h1>
            <p>Contaduría - Clasificador con Memoria IA</p>
        </div>
    </div>

    <div class="status-panel">
        <div class="stat-badge">📊 Memoria Local: <span id="memCount">0</span> reglas</div>
        <div class="stat-badge">🤖 Consultas IA hoy: <span id="aiUsage">0</span>/100</div>
        <div class="stat-badge">📂 Base CGN: <span id="cgnCount">0</span> objetos</div>
    </div>

    <div class="api-input-group">
        <label>🔑 API Key de Gemini: </label>
        <input type="password" id="apiKey" placeholder="Pega tu clave aquí...">
        <p style="font-size: 0.8em; color: #666; margin-top: 5px;">(Tu clave se guarda localmente en este navegador)</p>
    </div>

    <div id="uploadSection" class="upload-zone" onclick="document.getElementById('csvFile').click()">
        <h2>📥 Haz clic para cargar ObjetosGasto.csv</h2>
        <p>Necesario para inicializar la base de datos oficial</p>
        <input type="file" id="csvFile" class="hidden" accept=".csv">
    </div>

    <div id="mainUI" class="search-section">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Ej: Atún en trozos, Reparación motor, Gasas..." onkeypress="if(event.key==='Enter') ejecutarBusqueda()">
            <button onclick="ejecutarBusqueda()">ANALIZAR GASTO</button>
        </div>

        <div id="aiOutput"></div>
        <div id="resultsList" class="results-grid"></div>
    </div>
</div>

<script>
    let baseDatos = [];
    let memoriaLocal = JSON.parse(localStorage.getItem('hosp_flores_memoria') || '{}');
    let usoDia = parseInt(localStorage.getItem('hosp_flores_uso_ia') || '0');
    let fechaUso = localStorage.getItem('hosp_flores_fecha') || new Date().toDateString();

    // Inicialización
    window.onload = () => {
        const savedKey = localStorage.getItem('hosp_flores_key');
        if(savedKey) document.getElementById('apiKey').value = savedKey;
        
        // Resetear contador si es un nuevo día
        if(fechaUso !== new Date().toDateString()) {
            usoDia = 0;
            localStorage.setItem('hosp_flores_uso_ia', '0');
            localStorage.setItem('hosp_flores_fecha', new Date().toDateString());
        }
        actualizarUI();
    };

    function actualizarUI() {
        document.getElementById('memCount').innerText = Object.keys(memoriaLocal).length;
        document.getElementById('aiUsage').innerText = usoDia;
        document.getElementById('cgnCount').innerText = baseDatos.length;
    }

    // 📂 Procesamiento de CSV
    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            const lineas = ev.target.result.split('\n');
            baseDatos = lineas.slice(1).map(linea => {
                const col = linea.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // Split por coma ignorando comas en comillas
                return { 
                    obj: col[0]?.replace(/"/g,'').trim(), 
                    aux: col[1]?.replace(/"/g,'').trim(), 
                    nom: col[2]?.replace(/"/g,'').trim(), 
                    desc: col[3]?.replace(/"/g,'').trim() 
                };
            }).filter(i => i.obj);
            
            document.getElementById('uploadSection').classList.add('hidden');
            document.getElementById('mainUI').style.display = 'block';
            actualizarUI();
        };
        reader.readAsText(file, 'ISO-8859-1');
    });

    // 🔍 Lógica de Búsqueda
    async function ejecutarBusqueda() {
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        if(!q) return;

        const resultsDiv = document.getElementById('resultsList');
        const aiDiv = document.getElementById('aiOutput');
        resultsDiv.innerHTML = "buscando...";
        aiDiv.style.display = 'none';

        // 1. ¿Está en la memoria aprendida? (Gratis e Instantáneo)
        if(memoriaLocal[q]) {
            const item = baseDatos.find(i => i.obj === memoriaLocal[q].obj && i.aux === memoriaLocal[q].aux);
            renderResultados(item ? [item] : [], true);
            return;
        }

        // 2. Búsqueda Tradicional en CSV
        const filtrados = baseDatos.filter(i => 
            i.nom.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q) || i.obj.includes(q)
        ).slice(0, 10);

        renderResultados(filtrados, false);

        // 3. Consultar IA si no hay coincidencias claras o es un término complejo
        if(filtrados.length < 2) {
            consultarIA(q);
        }
    }

    function renderResultados(lista, esMemoria) {
        const resultsDiv = document.getElementById('resultsList');
        if(lista.length === 0) {
            resultsDiv.innerHTML = "<p style='text-align:center; padding:20px;'>No se encontraron coincidencias exactas en el CSV local.</p>";
            return;
        }
        resultsDiv.innerHTML = lista.map(i => `
            <div class="card">
                ${esMemoria ? '<span class="match-badge">REGLA APRENDIDA</span>' : ''}
                <div class="code">Objeto ${i.obj} / ${i.aux}</div>
                <div class="title">${i.nom}</div>
                <div class="desc">${i.desc}</div>
            </div>
        `).join('');
    }

    // 🤖 IA con Definiciones CGN Uruguay y Límites
    async function consultarIA(query) {
        const key = document.getElementById('apiKey').value;
        const aiDiv = document.getElementById('aiOutput');
        
        if(!key) {
            aiDiv.innerHTML = "⚠️ Ingrese API Key para analizar con IA.";
            aiDiv.style.display = 'block';
            return;
        }

        if(usoDia >= 100) {
            aiDiv.innerHTML = "⚠️ Límite de IA diario alcanzado (100).";
            aiDiv.style.display = 'block';
            return;
        }

        aiDiv.innerHTML = "⏳ La IA está analizando la naturaleza del gasto...";
        aiDiv.style.display = 'block';

        const prompt = `Actúa como contador experto en CGN Uruguay. Clasifica el gasto: "${query}". 
        Definiciones: Grupo 1 (Bienes consumo: comida, medicina, repuestos), Grupo 2 (Servicios: luz, reparaciones, fletes), Grupo 3 (Activos).
        Responde estrictamente en JSON: {"explicacion":"...", "objeto":"3 digitos", "auxiliar":"3 digitos"}`;

        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
            });
            const data = await resp.json();
            const resIA = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));
            
            usoDia++;
            localStorage.setItem('hosp_flores_uso_ia', usoDia);
            localStorage.setItem('hosp_flores_key', key);
            actualizarUI();

            aiDiv.innerHTML = `
                <strong>🤖 Sugerencia de la IA:</strong><br>${resIA.explicacion}<br>
                <button class="ai-confirm-btn" onclick="aprender('${query}', '${resIA.objeto}', '${resIA.auxiliar}')">
                    CONFIRMAR OBJETO ${resIA.objeto} (Guardar en memoria para siempre)
                </button>
            `;
        } catch(e) {
            aiDiv.innerHTML = "❌ Error al conectar con la IA.";
        }
    }

    function aprender(q, obj, aux) {
        memoriaLocal[q.toLowerCase()] = {obj, aux};
        localStorage.setItem('hosp_flores_memoria', JSON.stringify(memoriaLocal));
        document.getElementById('aiOutput').style.display = 'none';
        ejecutarBusqueda();
        actualizarUI();
    }
</script>

</body>
</html>
